<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الدخول إلى لعبة</title>

  <!-- ✅ تسريع فتح اللعبة -->
  <link rel="preload" href="game_full.html" as="document">

  <!-- ✅ خط واجهة اللاعبين -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#7b1f63;
      --yellow:#f4c400;
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --inputBg:rgba(255,255,255,.12);
      --inputBd:rgba(255,255,255,.22);
      --shadow:0 14px 36px rgba(0,0,0,.25);
    }

    @font-face{
      font-family:"AA-GALAXY";
      src:url("AA-GALAXY.otf") format("opentype");
      font-display:swap;
    }

    body{
      margin:0;
      font-family: "Baloo Bhaijaan 2", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align:center;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    header{ padding:22px 14px 0; }

    .logo{
      width:86px;
      height:86px;
      object-fit:contain;
      display:block;
      margin:0 auto 10px;
      pointer-events:none;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.22));
    }

    h1{
      margin:6px 0 0;
      color: var(--yellow);
      font-size:34px;
      letter-spacing:.2px;
      font-family:"AA-GALAXY", Arial, sans-serif;
      text-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .wrap{
      width:95%;
      max-width:720px;
      margin:18px auto 24px;
      padding:0 10px;
      box-sizing:border-box;
    }

    .panel{
      background: rgba(0,0,0,.08);
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      padding:18px 16px 16px;
      box-shadow: var(--shadow);
      box-sizing:border-box;
    }

    .input{
      width:min(84vw, 560px);
      max-width:560px;
      height:56px;
      border:1px solid var(--inputBd);
      outline:none;
      border-radius:16px;
      background: var(--inputBg);
      color:#fff;
      padding:0 16px;
      font-size:17px;
      box-sizing:border-box;
      margin:10px auto 6px;
      text-align:right;
    }
    .input::placeholder{ color: rgba(255,255,255,.75); }

    .btn{
      width:min(84vw, 560px);
      max-width:560px;
      height:58px;
      border:none;
      border-radius:16px;
      background:var(--yellow);
      color:#000;
      font-weight:900;
      font-size:19px;
      cursor:pointer;
      margin:12px auto 0;
      box-shadow:0 14px 28px rgba(0,0,0,.22);
    }

    .hint{
      margin-top:10px;
      font-size:13px;
      color: var(--muted);
    }

    .error{
      margin:12px auto 0;
      font-size:14px;
      color:#b91c1c;
      background:#fee2e2;
      border:1px solid #fecaca;
      padding:10px 12px;
      border-radius:14px;
      display:none;
      text-align:center;
      width:min(84vw, 560px);
      max-width:560px;
      box-sizing:border-box;
    }

    .loading{
      opacity:.75;
      pointer-events:none;
      user-select:none;
    }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="logo.png" alt="شعار صندوق المسابقات">
    <h1>الدخول إلى لعبة</h1>
  </header>

  <div class="wrap">
    <div class="panel">
      <input id="playerName" class="input" type="text" placeholder="اكتب اسمك هنا.." autocomplete="name" />
      <button id="joinBtn" class="btn">دخول</button>

      <div id="err" class="error"></div>
      <div class="hint" id="hintText"></div>
    </div>
  </div>

  <script type="module">
    const params = new URLSearchParams(location.search);

    // ✅ Sync base (Cloudflare Worker + Durable Objects + Pusher config)
    const DEFAULT_SYNC_BASE = "https://sync.horof.sandooq-games.com";
    const SYNC_BASE = String(params.get("sync") || DEFAULT_SYNC_BASE).replace(/\/+$/, "");
    const codeFromLink = params.get("code") || "";

    const nameEl = document.getElementById("playerName");
    const btn = document.getElementById("joinBtn");
    const err = document.getElementById("err");
    const hintText = document.getElementById("hintText");

    let joinBusy = false;

    const lastName = localStorage.getItem("sandooq_last_player_name");
    if(lastName && !nameEl.value) nameEl.value = lastName;

    try{
      localStorage.setItem("sandooq_sync_base", SYNC_BASE);
      sessionStorage.setItem("sandooq_sync_base", SYNC_BASE);
    }catch(e){}

    function showError(msg){
      err.textContent = msg;
      err.style.display = "block";
    }
    function clearError(){
      err.textContent = "";
      err.style.display = "none";
    }

    function normalizeDigits(s){
      const map = {
        "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
        "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
      };
      return String(s || "").replace(/[٠-٩۰-۹]/g, d => map[d] ?? d);
    }

    function cleanCode(s){
      return normalizeDigits(s).replace(/\D/g, "").slice(0,6);
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function withTimeout(promise, ms){
      let timer = null;
      try{
        return await Promise.race([
          promise,
          new Promise((_, reject) => {
            timer = setTimeout(() => reject(new Error("TIMEOUT")), ms);
          })
        ]);
      }finally{
        if(timer) clearTimeout(timer);
      }
    }

    const roomCode = cleanCode(codeFromLink);

    if(!roomCode){
      hintText.textContent = "افتح رابط الانضمام من المقدم أو امسح الباركود.";
    }else{
      hintText.textContent = "جاهز — اكتب اسمك واضغط دخول.";
    }

    function genPid(){
      try{
        if(crypto?.randomUUID) return crypto.randomUUID();
      }catch(e){}
      return (Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4));
    }

    function setCookie(name, value, maxAgeSeconds){
      const parts = [
        `${encodeURIComponent(name)}=${encodeURIComponent(String(value))}`,
        "Path=/",
        `Max-Age=${Math.max(60, Number(maxAgeSeconds || 86400))}`,
        "SameSite=Lax"
      ];
      if (location.protocol === "https:") parts.push("Secure");
      document.cookie = parts.join("; ");
    }

    function markAsGuestPlayer(code, pid){
      setCookie("sandooq_guest_player", "1", 60 * 60 * 12);
      setCookie("sandooq_role", "player", 60 * 60 * 12);
      setCookie("sandooq_room_code", code, 60 * 60 * 12);
      setCookie("sandooq_pid", pid, 60 * 60 * 12);

      try{
        localStorage.setItem("sandooq_guest_player", "1");
        localStorage.setItem("sandooq_role", "player");
        localStorage.setItem("sandooq_room_code", code);
        localStorage.setItem("sandooq_pid", pid);

        sessionStorage.setItem("sandooq_guest_player", "1");
        sessionStorage.setItem("sandooq_role", "player");
        sessionStorage.setItem("sandooq_room_code", code);
        sessionStorage.setItem("sandooq_pid", pid);
      }catch(e){}
    }

    function baseUrl(){
      return SYNC_BASE;
    }

    async function fetchState(pid = ""){
      const u = new URL(`${baseUrl()}/state`);
      u.searchParams.set("room", roomCode);
      if (pid) u.searchParams.set("pid", pid);

      const r = await fetch(u.toString(), { cache:"no-store" });
      const j = await r.json().catch(()=>null);
      if(!j || !j.ok) throw new Error("STATE_FAIL");
      return (j.state && typeof j.state === "object") ? j.state : {};
    }

    async function postAction(patch){
      const url = `${baseUrl()}/action?room=${encodeURIComponent(roomCode)}`;
      const r = await fetch(url, {
        method: "POST",
        headers: { "content-type":"application/json" },
        body: JSON.stringify(patch || {})
      });
      const j = await r.json().catch(()=>null);
      if(!j || !j.ok) throw new Error("ACTION_FAIL");
      return (j.state && typeof j.state === "object") ? j.state : null;
    }

    async function warmPusherConfig(){
      try{
        const cacheKey = `horof_pusher_config_${roomCode}`;
        if (sessionStorage.getItem(cacheKey)) return;
        const url = `${baseUrl()}/pusher/config?room=${encodeURIComponent(roomCode)}`;
        const r = await fetch(url, { cache:"no-store" });
        const j = await r.json().catch(()=>null);
        if(j && j.ok){
          sessionStorage.setItem(cacheKey, JSON.stringify(j.pusher || {}));
        }
      }catch(e){}
    }

    function countTeams(players){
      let g=0,o=0;
      for(const id of Object.keys(players || {})){
        if(players[id]?.team === "orange") o++;
        else if(players[id]?.team === "green") g++;
      }
      return { g, o };
    }

    function enforceLimit(players, max=13){
      const list = Object.entries(players || {}).map(([id, p]) => ({
        id,
        joinedAt: Number(p?.joinedAt || 0),
        p
      }));
      list.sort((a,b) => a.joinedAt - b.joinedAt);
      const keep = list.slice(0, max);
      const out = {};
      for(const it of keep) out[it.id] = it.p;
      return out;
    }

    function readPlayers(room){
      return (room && room.players && typeof room.players === "object") ? room.players : {};
    }

    function readStatus(room){
      const statusRaw = (room && room.status != null) ? String(room.status) : "";
      const status = (statusRaw === "started" || statusRaw === "lobby") ? statusRaw : (statusRaw ? statusRaw : "lobby");
      return { statusRaw, status };
    }

    function buildJoinPatch(room, pid, name, joinedAt){
      const { statusRaw, status } = readStatus(room);
      if(statusRaw && status !== "lobby" && status !== "started"){
        throw new Error("ROOM_NOT_READY");
      }

      const players = { ...readPlayers(room) };
      if(players[pid]){
        return { alreadyJoined: true, status, players };
      }

      const ids = Object.keys(players);
      if(ids.length >= 13){
        throw new Error("ROOM_FULL");
      }

      const { g, o } = countTeams(players);
      const team = (g <= o) ? "green" : "orange";
      players[pid] = { name, team, joinedAt };
      return { alreadyJoined: false, status, players };
    }

    async function join(){
      if(joinBusy) return;
      clearError();

      const name = (nameEl.value || "").trim();
      if(!name){
        showError("اكتب اسم اللاعب");
        return;
      }
      if(roomCode.length !== 6){
        showError("افتح رابط الانضمام الصحيح من المقدم (رمز الغرفة غير موجود)");
        return;
      }

      joinBusy = true;
      btn.classList.add("loading");
      btn.textContent = "جاري الدخول...";

      const MAX_PLAYERS = 13;
      const pid = genPid();
      const joinedAt = Date.now();

      try{
        localStorage.setItem("sandooq_last_player_name", name);

        let room = await fetchState(pid);
        let finalRoom = null;

        for(let attempt = 0; attempt < 2; attempt++){
          const patch = buildJoinPatch(room, pid, name, joinedAt);
          if(patch.alreadyJoined){
            finalRoom = room;
            break;
          }

          const afterAction = await postAction({ status: patch.status, players: patch.players });
          if(afterAction && readPlayers(afterAction)[pid]){
            finalRoom = afterAction;
            break;
          }

          if(attempt === 0){
            await sleep(140);
            room = await fetchState(pid);
            if(readPlayers(room)[pid]){
              finalRoom = room;
              break;
            }
          }
        }

        if(!finalRoom){
          showError("صار خطأ أثناء الانضمام، حاول مرة ثانية");
          return;
        }

        const pFinal = readPlayers(finalRoom);
        const idsF = Object.keys(pFinal);

        if(idsF.length > MAX_PLAYERS){
          const trimmed = enforceLimit(pFinal, MAX_PLAYERS);
          const kept = !!trimmed[pid];

          if(kept){
            finalRoom = (await postAction({ players: trimmed })) || finalRoom;
          }

          if(!kept){
            showError("الغرفة ممتلئة (الحد الأقصى 13 لاعب)");
            return;
          }
        }

        await withTimeout(warmPusherConfig(), 900).catch(() => {});
        markAsGuestPlayer(roomCode, pid);

        const u = new URL("game_full.html", location.href);
        u.searchParams.set("role", "player");
        u.searchParams.set("code", roomCode);
        u.searchParams.set("pid", pid);
        u.searchParams.set("guest", "1");
        u.searchParams.set("player", "1");
        u.searchParams.set("view", "player");
        u.searchParams.set("sync", SYNC_BASE);
        location.href = u.toString();

      }catch(e){
        if(e?.message === "ROOM_FULL"){
          showError("الغرفة ممتلئة (الحد الأقصى 13 لاعب)");
        }else if(e?.message === "ROOM_NOT_READY"){
          showError("الغرفة غير جاهزة حالياً");
        }else{
          showError("صار خطأ، حاول مرة ثانية");
        }
      }finally{
        joinBusy = false;
        btn.classList.remove("loading");
        btn.textContent = "دخول";
      }
    }

    btn.addEventListener("click", join);
    nameEl.addEventListener("keydown", (e) => { if(e.key === "Enter") join(); });
  </script>

  <!-- VERSION: join.html — cost-v1 -->
</body>
</html>
