      }catch(e){}

      try{ syncPersistentCustomQuestions(room); }catch(e){}

      try{
        const restartTs = Number(room?.restartTs || 0);
        if(restartTs && restartTs !== LAST_RESTART_TS){
          LAST_RESTART_TS = restartTs;
          if(role !== "host"){
            setTimeout(() => { try{ _pullOnce(true); }catch(e){} }, 40);
          }
        }
      }catch(e){}

      // ✅ (2) قصّ اللاعبين إذا تجاوزوا 13
      try{ prunePlayersIfOverLimit(room); }catch(e){}

      // ✅ (3) تشغيل المؤقت تلقائياً عند اعتماد أول لاعب يضغط الجرس
      try{
        if(role === "host"){
          const b = resolveStableBuzzer(room.buzzer, room.timer);
          const t = normalizeTimer(room.timer || {});
          if(b && b.ts){
            const sig = `${String(b.pid||"")}|${Number(b.ts)}`;
            if(sig && sig !== LAST_AUTO_TIMER_SIG){
              LAST_AUTO_TIMER_SIG = sig;

              if(!t.running && !t.done){
                const sel = Number(t.sel || 10);
                update(ref(db, `rooms/${code}/timer`), {
                  sel,
                  dur: sel,
                  running: true,
                  done: false,
                  startTs: Date.now()
                });
              }
            }
          }else{
            LAST_AUTO_TIMER_SIG = "";
          }
        }
      }catch(e){}

      // ✅ (تعديل 2) تشغيل rong فقط عند جهاز اللاعب الذي ضغط أولاً
      try{
        const b = resolveStableBuzzer(room.buzzer, room.timer);
        if(b && b.ts){
          const sig = `${String(b.pid||"")}|${Number(b.ts)}`;
          if(sig && sig !== LAST_BUZZER_SIG){
            LAST_BUZZER_SIG = sig;

            if(role !== "host"){
              const myPid = pid || localStorage.getItem(`sabaq_pid_${code}`) || "";
              if(myPid && String(b.pid||"") === String(myPid)){
                if(!playRong()) fallbackBeep();
              }
            }
          }
        }else{
          LAST_BUZZER_SIG = "";
          STABLE_BUZZER = null;
        }
      }catch(e){}

      try{
        const we = room.winEvent;

        if(FINAL_OVERLAY_ACTIVE && (!we || !we.ts)){
          resetFinalWinOverlayState();
        }

        if(we && we.ts && Number(we.ts) !== LAST_WIN_TS){
          LAST_WIN_TS = Number(we.ts);
          showWin(we.team, room, we);

          if(role === "host" && Number(we.ts) !== LAST_WIN_RESET_TS && !we.isFinal){
            LAST_WIN_RESET_TS = Number(we.ts);
            const currentMap = Number(room.activeMap || 0);
            const nextMap = currentMap + 1;
            setTimeout(async () => {
              try{
                const latestWinTs = Number((LIVE.room && LIVE.room.winEvent && LIVE.room.winEvent.ts) || 0);
                if(latestWinTs !== Number(we.ts)) return;
                const nextBoard = buildBoardState(LIVE.room || room, Date.now());
                LAST_STABLE_BOARD = nextBoard;
                const updates = {};
                updates[`rooms/${code}/activeMap`] = nextMap;
                updates[`rooms/${code}/board`] = nextBoard;
                updates[`rooms/${code}/mapStates/${currentMap}`] = null;
                updates[`rooms/${code}/mapStates/${nextMap}`] = {};
                updates[`rooms/${code}/buzzer`] = null;
                updates[`rooms/${code}/current`] = { letter:null, qIndex:0, row:null, col:null, map:nextMap };
                updates[`rooms/${code}/winState`] = null;
                updates[`rooms/${code}/winEvent`] = null;
                updates[`rooms/${code}/timer`] = { sel:Number(LIVE.room?.timer?.sel || room?.timer?.sel || 10), dur:Number(LIVE.room?.timer?.sel || room?.timer?.sel || 10), running:false, startTs:0, done:false };
                updates[`rooms/${code}/round/current`] = Math.max(1, Number(we.nextRound || ((Number(we.greenScore||0)+Number(we.orangeScore||0))+1)));
                updates[`rooms/${code}/round/boardSeed`] = Number(nextBoard.seed || 0) || 0;
                try{
                  LIVE.room = normalizeLiveRoom({
                    ...(LIVE.room || room || {}),
                    activeMap: nextMap,
                    board: nextBoard,
                    buzzer: null,
                    current: { letter:null, qIndex:0, row:null, col:null, map:nextMap },
                    winState: {},
                    winEvent: null,
                    timer: { sel:Number(LIVE.room?.timer?.sel || room?.timer?.sel || 10), dur:Number(LIVE.room?.timer?.sel || room?.timer?.sel || 10), running:false, startTs:0, done:false },
                    round: {
                      ...((LIVE.room && LIVE.room.round) || (room && room.round) || {}),
                      current: Math.max(1, Number(we.nextRound || ((Number(we.greenScore||0)+Number(we.orangeScore||0))+1))),
                      winner: null,
                      boardSeed: Number(nextBoard.seed || 0) || 0
                    },
                    mapStates: { ...(LIVE.room?.mapStates || room?.mapStates || {}), [String(currentMap)]: {}, [String(nextMap)]: {} }
                  });
                  scheduleRender();
                }catch(e){}
                await update(ref(db), updates);
              }catch(e){}
            }, 80);
          }
        }
      }catch(e){}
    }

    // ✅ Root listener only: أسرع وأكثر ثباتًا مع Pusher patches من المستمعات المجزأة القديمة
    function attachMapListeners(_mapId){
      // no-op
    }

    function normalizeLiveRoom(room){
      room = (room && typeof room === "object") ? room : {};
      const activeMap = Number(room.activeMap || 0);
      const normalized = {
        code,
        status: room.status ?? null,
        hostKey: room.hostKey ?? null,
        name: room.name ?? null,
        players: (room.players && typeof room.players === "object") ? room.players : {},
        displayPid: room.displayPid ?? null,
        activeMap,
        freeze: !!room.freeze,
        buzzer: room.buzzer ?? null,
        scores: (room.scores && typeof room.scores === "object") ? room.scores : { green:0, orange:0, a:0, b:0 },
        settings: (room.settings && typeof room.settings === "object") ? room.settings : {},
        teams: (room.teams && typeof room.teams === "object") ? room.teams : {},
        board: (room.board && typeof room.board === "object") ? room.board : null,
        restartTs: Number(room.restartTs || 0),
        round: (room.round && typeof room.round === "object") ? room.round : { current:1, targetWins: normalizeWinRounds(room?.settings?.winRounds || 1), winner:null, boardSeed: Number(room?.board?.seed || 0) || 0 },
        winEvent: room.winEvent ?? null,
        winState: (room.winState && typeof room.winState === "object") ? room.winState : {},
        mapStates: (room.mapStates && typeof room.mapStates === "object") ? room.mapStates : {},
        current: (room.current && typeof room.current === "object") ? room.current : { letter:null, qIndex:0, row:null, col:null, map: activeMap },
        timer: (room.timer && typeof room.timer === "object") ? room.timer : { sel:10, dur:10, running:false, startTs:0, done:false },
        questionMode: String(room.questionMode || "default"),
        customQuestions: (room.customQuestions && typeof room.customQuestions === "object") ? room.customQuestions : {},
        customQuestionsUpdatedAt: Number(room.customQuestionsUpdatedAt || 0),
        questionCursorDefault: (room.questionCursorDefault && typeof room.questionCursorDefault === "object") ? room.questionCursorDefault : {},
        questionCursorCustom: (room.questionCursorCustom && typeof room.questionCursorCustom === "object") ? room.questionCursorCustom : {}
      };

      const expectedSeed = getExpectedBoardSeed(normalized);
      const roomBoard = normalizeBoardState(room?.board, normalized);

      if(roomBoard && (!expectedSeed || Number(roomBoard.seed || 0) === expectedSeed)){
        normalized.board = rememberBoard(roomBoard, normalized);
      }else if(expectedSeed && BOARD_CACHE_BY_SEED.has(expectedSeed)){
        normalized.board = BOARD_CACHE_BY_SEED.get(expectedSeed);
        LAST_STABLE_BOARD = normalized.board;
      }else if(expectedSeed){
        normalized.board = rememberBoard(buildBoardState(normalized, expectedSeed), normalized);
      }else if(roomBoard){
        normalized.board = rememberBoard(roomBoard, normalized);
      }else if(LAST_STABLE_BOARD){
        normalized.board = LAST_STABLE_BOARD;
      }else{
        normalized.board = rememberBoard(buildBoardState(normalized, Date.now()), normalized);
      }

      return normalized;
    }

    function getMeFromPlayers(players){
      if(!players) return null;

      if(pid && players[pid]) return ({...players[pid], __id: pid});

      const k = `sabaq_pid_${code}`;
      const stored = localStorage.getItem(k);
      if(stored && players[stored]) return ({...players[stored], __id: stored});

      return null;
    }

    function scheduleRender(){
      if(VIEW.scheduled) return;
      VIEW.scheduled = true;
      VIEW.raf = requestAnimationFrame(() => {
        VIEW.scheduled = false;
        renderFromLive();
      });
    }

    function renderFromLive(){
      const room = LIVE.room || {};

      // وجود الغرفة (تقريبي)
      const players = room.players || {};
      const hasAny =
        room.status !== null ||
        room.hostKey !== null ||
        (players && Object.keys(players).length > 0);

      if(!hasAny){
        // ✅ (Fix) أحياناً بعد إنشاء الغرفة مباشرة يحتاج ثواني بسيطة قبل ما تظهر الحالة
        if(!VIEW.missingSince) VIEW.missingSince = Date.now();
        const dt = Date.now() - VIEW.missingSince;

        if(dt < 2500){
          // أول ثانيتين ونص: نعرض "جاري الاتصال" بدل "الغرفة غير موجودة"
          if(role === "host"){
            renderHostWaiting("جاري إنشاء الغرفة… انتظر لحظة.");
          }else{
            renderConnecting("جاري الاتصال بالغرفة…");
          }
          VIEW.type = "connecting";
          return;
        }

        // بعد المهلة: اللاعب يشوف صفحة (الغرفة غير موجودة) + شراء
        // المقدم يشوف رسالة خاصة (بدون صفحة اللاعبين)
        if(role === "host"){
          renderHostWaiting("تعذر العثور على بيانات الغرفة. جرّب إعادة المحاولة أو ارجع وأنشئ غرفة جديدة.");
          VIEW.type = "host_wait";
          return;
        }

        renderWaiting("الغرفة غير موجودة.");
        VIEW.type = "wait";
        VIEW.waitingMsg = "الغرفة غير موجودة.";
        return;
      }else{
        // ✅ رجّع المؤقت إذا ظهرت الغرفة
        VIEW.missingSince = 0;
      }

      // Host auth
      if(role === "host"){
        if(room.hostKey && hostKey && String(room.hostKey) !== String(hostKey)){
          main.textContent = "ليس لديك صلاحية دخول كمقدم.";
          VIEW.type = "error";
          return;
        }
      }

      // حد اللاعبين
      try{ prunePlayersIfOverLimit(room); }catch(e){}

      // Player me
      LIVE.me = (role === "host") ? null : getMeFromPlayers(players);

      // Views
      if(role === "host"){
        if(room.status === "started"){
          if(VIEW.type !== "host_game"){
            // mount مرة واحدة فقط
            renderGame(room, null);
            VIEW.type = "host_game";
          }
          updateGameUI();
          afterRender(room);
          return;
        }else{
          const sig = `${String(room.displayPid || "")}|` + Object.entries(players)
            .map(([id,p]) => `${id}:${p?.team||""}:${p?.name||""}:${Number(p?.joinedAt||0)}`)
            .sort()
            .join("|");

          if(VIEW.type !== "host_lobby" || VIEW.lobbySig !== sig){
            VIEW.lobbySig = sig;
            renderHostLobby(room);
            VIEW.type = "host_lobby";
          }
          afterRender(room);
          return;
        }
      }

      // Player branch
      const playerCount = Object.keys(players).length;

      if(!LIVE.me && playerCount >= MAX_PLAYERS){
        if(VIEW.type !== "wait" || VIEW.waitingMsg !== "الغرفة ممتلئة"){
          VIEW.waitingMsg = "الغرفة ممتلئة";
          renderWaiting("الغرفة ممتلئة");
          VIEW.type = "wait";
        }
        afterRender(room);
        return;
      }

      if(room.status !== "started"){
        if(VIEW.type !== "wait" || VIEW.waitingMsg !== "بانتظار بدء اللعبة..."){
          VIEW.waitingMsg = "بانتظار بدء اللعبة...";
          renderWaiting("بانتظار بدء اللعبة...");
          VIEW.type = "wait";
        }
        afterRender(room);
        return;
      }

      if(!LIVE.me && playerCount >= MAX_PLAYERS){
        if(VIEW.type !== "wait" || VIEW.waitingMsg !== "الغرفة ممتلئة"){
          VIEW.waitingMsg = "الغرفة ممتلئة";
          renderWaiting("الغرفة ممتلئة");
          VIEW.type = "wait";
        }
        afterRender(room);
        return;
      }

      const myPid = LIVE.me && (LIVE.me.__id || null);
      const isTv = !!(myPid && room.displayPid && String(myPid) === String(room.displayPid));

      if(isTv){
        if(VIEW.type !== "tv_game"){
          renderTvDisplay(room, LIVE.me);
          VIEW.type = "tv_game";
        }
        updateGameUI();
        afterRender(room);
        return;
      }

      if(VIEW.type !== "player_game"){
        renderGame(room, LIVE.me);
        VIEW.type = "player_game";
      }
      updateGameUI();
      afterRender(room);
    }

    // ✅ Root room listener only
    function startRoomListeners(){
      onValue(ref(db, `rooms/${code}`), (s) => {
        LIVE.room = normalizeLiveRoom(s.val() || {});
        scheduleRender();
      });
    }

    startRoomListeners();
    scheduleRender();

  </script>
