  <style>
    @font-face{
      font-family:"AA-GALAXY";
      src:url("AA-GALAXY.otf?v=2026-02-15-1") format("opentype");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg1:#7b1f63;
      --bg2:#5f214f;
      --bg3:#3a1234;

      --white:#fff;
      --black:#111;

      --pillA: rgba(255,255,255,.16);
      --pillB: rgba(255,255,255,.10);

      --outline: rgba(255,255,255,.75);
      --outline2: rgba(0,0,0,.65);

      --shadow: 0 16px 30px rgba(0,0,0,.30);

      --timerFill:#b33a6a;

      --hexGreen:  rgba(0, 140, 70, .42);
      --hexOrange: rgba(255, 140, 0, .42);
      --hexPale:   rgba(255, 215, 80, .68);
      --hexBorder: rgba(0,0,0,.10);

      --red:#ff2d2d;
      --green:#1aa34a;
      --orange:#f28c00;

      /* ✅ جديد */
      --cyan:#7dd3fc;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    html{
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
    }

    body{
      margin:0;
      color:#fff;
      text-align:center;
      font-family:"AA-GALAXY", Arial, sans-serif;
      background:
        radial-gradient(1100px 700px at 20% 10%, rgba(255,255,255,.12), transparent 60%),
        radial-gradient(900px 650px at 80% 25%, rgba(255,255,255,.08), transparent 55%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;

      min-height: 100svh;
      min-height: 100dvh;

      padding-bottom: calc(96px + constant(safe-area-inset-bottom));
      padding-bottom: calc(96px + env(safe-area-inset-bottom));
    }

    button, input, textarea{
      font-family:"AA-GALAXY", Arial, sans-serif;
    }

    /* ✅ هيدر مثل الصورة */
    header{
      position:relative;
      padding:18px 14px 8px;
    }
    .headerRow{
      display:grid;
      grid-template-columns:72px minmax(0,1fr) 72px;
      align-items:center;
      gap:12px;
      width:100%;
      direction:ltr;
    }
    .logo{
      width:72px;height:72px;
      object-fit:contain;
      flex:0 0 auto;
    }
    h1{
      display:none !important;
    }

    /* ✅ (6) إزالة الإطار الأسود حول اسم اللعبة + النص أصفر بدون ظل */
    .gameName{
      grid-column:2;
      width:100%;
      min-height:unset;
      padding:4px 0 0;
      border-radius:0;
      background:none;
      border:none;
      color:#fff;
      font-weight:900;
      line-height:1.15;
      text-align:center;
      overflow:hidden;
      direction:rtl;
      box-shadow:none;
      text-shadow:none;
      align-self:center;
      justify-self:center;
    }
    .gameName:empty{display:none;}
    .gnText{
      display:block;
      overflow:hidden;
      word-break:break-word;
      white-space:nowrap;
      text-overflow:ellipsis;
      font-size:34px;
      text-shadow:none;
    }

    .wrap{ width:95%; max-width:900px; margin:0 auto; }

    /* ✅ جسم الصفحة شفاف مثل الصورة */
    .card{
      background:transparent;
      color:#fff;
      width:100%;
      margin:0 auto;
      padding:0;
      border-radius:0;
    }

    #main.inGame{
      margin-top:6px;
      padding-top:0;
    }

    .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center}

    /* ✅ زر الرجوع مثل الصورة (زر أبيض أسفل يسار) */
    .footerBtn{
      position:fixed;
      left:18px;
      bottom:18px;
      padding:14px 20px;
      border-radius:999px;
      border:4px solid rgba(0,0,0,.85);
      background:#fff;
      color:#111;
      font-size:22px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(0,0,0,.26);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index:20000;
    }
    .footerBtn:active{ transform: translateY(1px); }

    .rights{
      position:fixed;
      right:18px;
      bottom:24px;
      color:rgba(255,255,255,.70); /* ✅ أخف */
      font-size:14px;             /* ✅ أصغر */
      font-weight:700;
      z-index:20000;
      text-shadow:0 8px 18px rgba(0,0,0,.30);
    }

    /* ✅ صفحات اللوبي/الانتظار */
    .codeBox{font-size:24px;font-weight:900}
    .codeNum{font-size:36px;font-weight:900;letter-spacing:2px}
    .smallNote{font-size:14px;opacity:.9;margin-top:8px}

    .lobbyCard{
      width:100%;
      background:rgba(0,0,0,.10);
      border:4px solid rgba(255,255,255,.22);
      border-radius:18px;
      padding:16px 14px;
      box-shadow:0 12px 24px rgba(0,0,0,.20);
      color:#fff;
      margin:10px auto 0;
    }
    .btn{
      padding:14px 18px;
      font-size:20px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      font-weight:900;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active{ transform: translateY(1px); }

    .btnYellow{background:#ffd54a;color:#111;border:4px solid rgba(0,0,0,.80);box-shadow:0 8px 0 rgba(0,0,0,.18);}
    .btnGreen{background:rgba(26,163,74,.95);color:#fff;border:4px solid rgba(0,0,0,.80);box-shadow:0 8px 0 rgba(0,0,0,.18);}
    .btnOrange{background:rgba(242,140,0,.95);color:#fff;border:4px solid rgba(0,0,0,.80);box-shadow:0 8px 0 rgba(0,0,0,.18);}
    .btnRed{background:#ff2d2d;color:#fff;border:4px solid rgba(0,0,0,.80);box-shadow:0 8px 0 rgba(0,0,0,.18);}
    .btnBlue{background:#e9eefc;color:#1f4fa3;border:4px solid rgba(0,0,0,.80);box-shadow:0 8px 0 rgba(0,0,0,.18);}
    .tvPickList{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .tvPickBtn{width:100%;font-size:18px}
    .tvPickBtn.selectedTv{background:#16a34a !important;color:#fff !important;}
    .tvCurrentNote{margin-top:10px;color:#111;text-align:center;font-size:14px;font-weight:900}
    .playerTvBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-inline-start:8px;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(125,211,252,.25);
      border:2px solid rgba(125,211,252,.70);
      color:#fff;
      font-size:14px;
      font-weight:900;
      vertical-align:middle;
    }

    .teams{display:flex;gap:12px;flex-wrap:wrap}
    .teamCol{flex:1;min-width:240px;border-radius:16px;padding:12px;color:#fff;border:4px solid rgba(0,0,0,.70);box-shadow:0 12px 24px rgba(0,0,0,.18)}
    .teamGreen{background:rgba(26,163,74,.78)}
    .teamOrange{background:rgba(242,140,0,.78)}
    .teamTitle{font-weight:900;margin-bottom:8px;font-size:20px}
    .playerItem{
      background:rgba(255,255,255,.18);
      padding:10px;border-radius:14px;margin:8px 0;cursor:pointer;
      border:2px solid rgba(255,255,255,.18);
    }

    /* ✅ الخريطة */
    .mapOuter{width:100%;display:flex;justify-content:center}
    .mapScale{
      width:min(92vw, 760px);
      transform:scale(var(--zoom, 1));
      transform-origin:center top;
    }
    .mapBox{
      position:relative;
      width:100%;
      aspect-ratio:1 / 0.78;
      overflow:hidden;
      border-radius:26px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 35%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.10), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,0,0,.10));
      box-shadow:0 18px 34px rgba(0,0,0,.30);
      border:6px solid rgba(0,0,0,.80);
    }
    .boardBg{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,.18), transparent 24%),
        radial-gradient(circle at 78% 18%, rgba(255,255,255,.14), transparent 22%),
        radial-gradient(circle at 50% 86%, rgba(255,255,255,.10), transparent 22%),
        conic-gradient(from -45deg at 50% 50%,
          var(--team-b-soft, #e7d570) 0deg 90deg,
          var(--team-a-soft, #7cb7e8) 90deg 180deg,
          var(--team-b-soft, #e7d570) 180deg 270deg,
          var(--team-a-soft, #7cb7e8) 270deg 360deg);
      pointer-events:auto;
    }
    .boardFrameLabel{
      display:none !important;
      position:absolute;
      top:12px;
      right:12px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.28);
      border:2px solid rgba(255,255,255,.18);
      color:#fff;
      font-size:16px;
      font-weight:900;
      z-index:2;
      pointer-events:none;
    }
    .overlaySvg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:auto;
      z-index:3;
    }
    .overlaySvg .cell{
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      stroke: var(--cell-stroke, #5d2a9d);
      stroke-width: 5;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.12));
      transition: fill .18s ease, transform .18s ease, opacity .18s ease;
    }
    .overlaySvg .cell.selectedCell{
      stroke: var(--cell-stroke, #6f35b2);
      stroke-width: 5;
      fill: #ffe600 !important;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.10));
    }
    .overlaySvg .cellLetter{
      fill:var(--cell-letter, #5d2a9d);
      font-family:"AA-GALAXY", Arial, sans-serif;
      font-size:30px;
      font-weight:900;
      text-anchor:middle;
      dominant-baseline:middle;
      pointer-events:none;
      paint-order:stroke;
      stroke:rgba(255,255,255,.72);
      stroke-width:2px;
      user-select:none;
      transition: fill .18s ease, stroke .18s ease;
    }
    .overlaySvg .cellLetter.state0,
    .overlaySvg .cellLetter.state1{
      fill:var(--cell-letter, #5d2a9d);
      stroke:rgba(255,255,255,.78);
    }
    .overlaySvg .cellLetter.state2,
    .overlaySvg .cellLetter.state3{
      fill:transparent;
      stroke:transparent;
      opacity:0;
    }
    .overlaySvg .state0{ fill: var(--cell-base, #ffffff); }
    .overlaySvg .state1{ fill: #ffe600; }
    .overlaySvg .state2{ fill: var(--team-a-color, #1aa34a); }
    .overlaySvg .state3{ fill: var(--team-b-color, #f28c00); }

    @keyframes selectGlow {
      0%   { stroke-width: 7; filter: drop-shadow(0 0 6px rgba(244,196,0,.30)); }
      50%  { stroke-width: 9; filter: drop-shadow(0 0 12px rgba(244,196,0,.55)); }
      100% { stroke-width: 7; filter: drop-shadow(0 0 6px rgba(244,196,0,.30)); }
    }
    .overlaySvg .state1.pulse {
      animation: selectGlow 0.9s ease-in-out infinite;
      fill: var(--cell-base, #ffffff) !important;
      stroke:#f4c400 !important;
    }

    /* ✅ صف الأزرار تحت الخريطة (نفس الصورة) */
    .mapToolsRow{
      margin:12px auto 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      direction:rtl;
      flex-wrap:nowrap;
      width:min(92vw, 760px);
    }

    .circleBtn{
      width:58px;height:58px;
      border-radius:50%;
      border:4px solid rgba(0,0,0,.85);
      background:#fff;
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,.25);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      flex:0 0 auto;
      user-select:none;
      position:relative;
      overflow:visible;
    }
    .circleBtn:active{ transform: translateY(1px); }
    .circleBtn svg{ width:28px;height:28px; fill:#111; }

    /* ✅ (4) زر الأسئلة الخاصة يتحول سماوي */
    .circleBtn.cyan{
      background: var(--cyan);
    }

    .zoomWrap{
      flex:1 1 auto;
      min-width:220px;
      max-width:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* ✅ سلايدر مثل الصورة */
    input[type="range"]{
      width:100%;
      -webkit-appearance:none;
      appearance:none;
      height:10px;
      border-radius:999px;
      background:rgba(255,255,255,.80);
      border:4px solid rgba(0,0,0,.85);
      box-shadow:0 10px 18px rgba(0,0,0,.18);
      outline:none;
    }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:18px;height:34px;
      border-radius:10px;
      background:#111;
      border:2px solid rgba(255,255,255,.65);
      box-shadow:0 6px 14px rgba(0,0,0,.25);
    }
    input[type="range"]::-moz-range-thumb{
      width:18px;height:34px;
      border-radius:10px;
      background:#111;
      border:2px solid rgba(255,255,255,.65);
      box-shadow:0 6px 14px rgba(0,0,0,.25);
    }

    /* ✅ (2) علامة ؟ صغيرة + نافذة شرح */
    .helpDot{
      position:absolute;
      top:-8px;
      left:-8px;
      width:22px;height:22px;
      border-radius:50%;
      background:rgba(255,255,255,.55);
      border:2px solid rgba(0,0,0,.45);
      color:rgba(0,0,0,.70);
      font-size:14px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 6px 12px rgba(0,0,0,.18);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select:none;
    }
    .helpDot:active{ transform: translateY(1px); }

    .tipPopup{
      position:fixed;
      z-index:30000;
      max-width:min(80vw, 260px);
      padding:10px 12px;
      border-radius:14px;
      background:#fff;
      color:#111;
      border:4px solid rgba(0,0,0,.85);
      box-shadow:0 18px 28px rgba(0,0,0,.26);
      font-size:16px;
      font-weight:900;
      line-height:1.35;
      display:none;
      text-align:right;
    }

    /* ✅ لوحة النتائج */
    .scoreBoard{
      width:min(92vw, 760px);
      margin:10px auto 6px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .teamPill{
      flex:1 1 0;
      height:56px;
      border-radius:999px;
      border:4px solid rgba(0,0,0,.85);
      color:#fff;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 18px rgba(0,0,0,.20);
      white-space:nowrap;
      user-select:none;
    }
    .teamPill.green{ background:rgba(26,163,74,.95); }
    .teamPill.orange{ background:rgba(242,140,0,.95); }
    .teamPill.clickable{ cursor:pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .teamPill.clickable:active{ transform: translateY(1px); }
    .teamPill.selected{ box-shadow:0 0 0 5px rgba(244,196,0,.35), 0 10px 18px rgba(0,0,0,.20); transform:translateY(-1px); }

    .scoreBox{
      width:64px;
      height:56px;
      border-radius:14px;
      border:4px solid rgba(0,0,0,.85);
      background:#fff;
      color:#111;
      font-size:28px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 18px rgba(0,0,0,.20);
      user-select:none;
    }
    .scoreBox.clickable{ cursor:pointer; }
    .scoreBox:active{ transform: translateY(1px); }

    /* ✅ (4) Stepper للأسكور: سهم فوق/تحت */
    .scoreStepBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0); /* شفاف */
      display:none;
      z-index:26000;
    }
    .scoreStepper{
      position:fixed;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      width:72px;
      user-select:none;
    }
    .scoreStepBtn{
      width:64px;
      height:44px;
      border-radius:14px;
      border:4px solid rgba(0,0,0,.85);
      background:#ffd54a;
      color:#111;
      font-size:28px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 0 rgba(0,0,0,.18);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .scoreStepBtn:active{ transform: translateY(1px); box-shadow:0 7px 0 rgba(0,0,0,.18); }
    .scoreStepVal{
      width:64px;
      height:56px;
      border-radius:14px;
      border:4px solid rgba(0,0,0,.85);
      background:#fff;
      color:#111;
      font-size:28px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 18px rgba(0,0,0,.20);
    }

    /* ✅ شريط اسم أول لاعب (pill) */
    .firstPressBar{
      width:min(92vw, 760px);
      margin:10px auto 10px;
      border-radius:999px;
      padding:16px 16px;
      background:rgba(255,255,255,.16);
      border:4px solid rgba(255,255,255,.70);
      color:#fff;
      font-weight:900;
      box-shadow:0 16px 26px rgba(0,0,0,.22);

      border-radius:999px;

      width:min(92vw, 760px);
      margin:12px auto 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

      width:260px;
      max-width:42vw;
      height:78px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10));
      border:4px solid rgba(255,255,255,.80);
      color:#fff;
      font-size:28px;

      0%   { box-shadow:0 0 0 0 rgba(255,255,255,.0), 0 18px 30px rgba(0,0,0,.25); }
      50%  { box-shadow:0 0 0 10px rgba(255,255,255,.35), 0 18px 30px rgba(0,0,0,.25); }

      0%,49% { color:#fff; }
      50%,100% { color:#111; }

    }

    function getSupportedQuestionLetters(){

        return out.length ? out : BASE_LETTERS.slice();
      }catch(e){
        return BASE_LETTERS.slice();
      }
    }

    function buildHexPlaceholderBoard(size, seed){
      const total = Math.max(1, Number(size || 6)) ** 2;
      const rand = makeSeededRand(seed || Date.now());
      const supportedLetters = getSupportedQuestionLetters();
      const visiblePool = [];

      while(visiblePool.length < total){
        visiblePool.push(...shuffleArraySeeded(supportedLetters, rand));
      }

      const flat = visiblePool.slice(0, total);
      const rows = [];
      for(let r=0; r<size; r++) rows.push(flat.slice(r * size, (r + 1) * size));
      return { letters: rows, hiddenLetters: {} };
    }

    function generateBoardLetters(size, seed){
      const needed = Math.max(1, Number(size||5)) ** 2;
      const rand = makeSeededRand(seed || Date.now());
      const pool = [];
      while(pool.length < needed){
        pool.push(...shuffleArraySeeded(BASE_LETTERS, rand));
      }
      const picked = pool.slice(0, needed);
      const rows = [];
      for(let r=0;r<size;r++) rows.push(picked.slice(r*size, (r+1)*size));
      return rows;
    }

    function cloneBoardState(boardLike, roomLike){
      const n = normalizeBoardState(boardLike, roomLike);
      if(!n) return null;
      return {
        size: n.size,
        shape: n.shape,
        seed: n.seed,
        letters: Array.isArray(n.letters) ? n.letters.map(row => Array.isArray(row) ? row.slice() : []) : [],
        hiddenLetters: (n.hiddenLetters && typeof n.hiddenLetters === "object") ? { ...n.hiddenLetters } : {}
      };

    function buildBoardState(roomLike, seedTs){
      const size = getBoardSize(roomLike || {});

      const special = { letters: generateBoardLetters(size, seed), hiddenLetters: {} };
      return {

        shape,
        seed,
        letters: special.letters,
        hiddenLetters: special.hiddenLetters || {}
      };
    }

    let LAST_STABLE_BOARD = null;
    const BOARD_CACHE_BY_SEED = new Map();

    function normalizeBoardState(boardLike, roomLike){
      if(!boardLike || !Array.isArray(boardLike.letters) || !boardLike.letters.length) return null;
      return {
        size: normalizeCellCount(boardLike.size || boardLike.letters.length || 5),
        shape: normalizeCellShape(boardLike.shape || getBoardShape(roomLike)),
        seed: Number(boardLike.seed || 0),
        letters: boardLike.letters,
        hiddenLetters: (boardLike.hiddenLetters && typeof boardLike.hiddenLetters === "object") ? boardLike.hiddenLetters : {}

    function rememberBoard(boardLike, roomLike){
      const board = cloneBoardState(boardLike, roomLike);

    function getExpectedBoardSeed(room){

      return rememberBoard(buildBoardState(room || {}, Date.now()), room);

// ✅ Sync (Firebase removed): Cloudflare Worker + Durable Objects
// Worker base (change only if you deploy a different worker)
const SYNC_BASE = params.get("sync") || "https://sync.horof.sandooq-games.com";

// Local cache of room state (Durable Object stores ONE JSON state per room)
const SYNC = {
  state: {},           // room root object (equivalent to rooms/{code} in Firebase)
  lastPullAt: 0,
  pulling: false,
  pollMs: 350
};

function _stripRoomPrefix(path){
  // Firebase paths in this file look like: rooms/${code}/...
  if(!path) return "";
  path = String(path).replace(/^\/+/, "");
  const p1 = `rooms/${code}`;
  if(path === p1) return "";
  if(path.startsWith(p1 + "/")) return path.slice((p1 + "/").length);
  // if caller already sent relative path
  if(path.startsWith("rooms/")) return path.replace(/^rooms\//,""); // fallback
  return path;
}

function _split(path){
  path = _stripRoomPrefix(path);
  if(!path) return [];
  return path.split("/").filter(Boolean).map(seg => seg);
}

function _get(obj, path){
  const parts = _split(path);
  let cur = obj;
  for(const seg of parts){
    if(cur == null) return undefined;
    cur = cur[seg];
  }
  return cur;
}

function _ensureChild(cur, seg, nextSeg){
  if(cur[seg] == null || typeof cur[seg] !== "object"){
    // decide array vs object? keep object; your state uses objects not arrays for keys
    cur[seg] = {};
  }
  return cur[seg];
}

function _set(obj, path, value){
  const parts = _split(path);
  if(parts.length === 0){
    // set root
    SYNC.state = value && typeof value === "object" ? value : {};
    return;
  }
  let cur = obj;
  for(let i=0;i<parts.length-1;i++){
    const seg = parts[i];
    cur = _ensureChild(cur, seg, parts[i+1]);
  }
  cur[parts[parts.length-1]] = value;
}

function _mergeAtPath(obj, path, patch){
  const rel = _stripRoomPrefix(path);
  if(!rel){
    // merge into root
    if(patch && typeof patch === "object" && !Array.isArray(patch)){
      SYNC.state = SYNC.state && typeof SYNC.state === "object" ? SYNC.state : {};
      Object.assign(SYNC.state, patch);
    }else{
      SYNC.state = patch;
    }
    return;
  }
  const existing = _get(obj, rel);
  if(existing && typeof existing === "object" && !Array.isArray(existing) && patch && typeof patch === "object" && !Array.isArray(patch)){
    _set(obj, rel, Object.assign({}, existing, patch));
  }else{
    _set(obj, rel, patch);
  }
}

function _topKey(relPath){
  relPath = _stripRoomPrefix(relPath);
  if(!relPath) return ""; // root
  return relPath.split("/")[0];
}

function _snapshot(v){
  return {
    val: () => v,
    exists: () => v !== undefined && v !== null
  };
}

const _watchers = new Map();      // path -> Set(callback)
const _lastStr = new Map();       // path -> JSON string of last value

function ref(_db, path=""){
  return { path: String(path || "") };
}

async function _pullOnce(force=false){
  if(SYNC.pulling) return;
  const now = Date.now();
  if(!force && now - SYNC.lastPullAt < Math.max(250, SYNC.pollMs - 50)) return;
  SYNC.pulling = true;
  try{
    const url = `${SYNC_BASE.replace(/\/$/,"")}/state?room=${encodeURIComponent(code)}&pid=${encodeURIComponent(pid)}`;
    const r = await fetch(url, { cache: "no-store" });
    const j = await r.json().catch(()=>null);
    if(j && j.ok){
      SYNC.state = (j.state && typeof j.state === "object") ? j.state : {};
      SYNC.lastPullAt = now;
      // notify watchers
      for(const [path, set] of _watchers.entries()){
        const v = _get(SYNC.state, path);
        let s;
        try{ s = JSON.stringify(v); }catch(e){ s = String(v); }
        if(_lastStr.get(path) !== s){
          _lastStr.set(path, s);
          set.forEach(cb => { try{ cb(_snapshot(v)); }catch(e){} });
        }
      }
    }
  }catch(e){
    // ignore transient network errors
  }finally{
    SYNC.pulling = false;
  }
}

function onValue(r, cb){
  const p = _stripRoomPrefix(r?.path || "");
  if(!_watchers.has(p)) _watchers.set(p, new Set());
  _watchers.get(p).add(cb);
  // call once immediately with current cached value (may be undefined until first pull)
  try{ cb(_snapshot(_get(SYNC.state, p))); }catch(e){}
  // ensure we start polling
  _pullOnce(true);
  return () => { try{ _watchers.get(p)?.delete(cb); }catch(e){} };
}

async function _action(patch){
  const url = `${SYNC_BASE.replace(/\/$/,"")}/action?room=${encodeURIComponent(code)}&pid=${encodeURIComponent(pid)}`;
  const r = await fetch(url, {
    method: "POST",
    headers: { "content-type":"application/json" },
    body: JSON.stringify(patch || {})
  });
  // update local state from response if present
  const j = await r.json().catch(()=>null);
  if(j && j.ok && j.state && typeof j.state === "object"){
    SYNC.state = j.state;
  }else{
    // fallback: pull
    await _pullOnce(true);
  }
  // notify watchers immediately after action
  for(const [path, set] of _watchers.entries()){
    const v = _get(SYNC.state, path);
    let s;
    try{ s = JSON.stringify(v); }catch(e){ s = String(v); }
    if(_lastStr.get(path) !== s){
      _lastStr.set(path, s);
      set.forEach(cb => { try{ cb(_snapshot(v)); }catch(e){} });
    }
  }
  return j;
}

async function update(r, value){
  // Firebase: update(ref(db, "path"), {a:1}) OR update(ref(db), {"rooms/x/a":1, ...})
  const rawPath = String(r?.path || "");
  const roomRootPath = `rooms/${code}`;
  const roomBuzzerPath = `${roomRootPath}/buzzer`;
  const roomWrittenAnswerPath = `${roomRootPath}/writtenAnswer`;

  if(!rawPath){
    // multi path update
    const updates = { ...(value || {}) };
    if(Object.prototype.hasOwnProperty.call(updates, roomBuzzerPath) && updates[roomBuzzerPath] === null && !Object.prototype.hasOwnProperty.call(updates, roomWrittenAnswerPath)){
      updates[roomWrittenAnswerPath] = null;
    }
    const topPatch = {};
    for(const [k, v] of Object.entries(updates)){
      _mergeAtPath(SYNC.state, k, v);
      const tk = _topKey(k);
      if(!tk){
        // root path update: merge all top-level keys from SYNC.state
        Object.assign(topPatch, (v && typeof v === "object" && !Array.isArray(v)) ? v : {});
      }else{
        topPatch[tk] = SYNC.state[tk];
      }
    }
    return _action(topPatch);
  }else{
    // single node update
    let nextValue = value;
    if(rawPath === roomRootPath && nextValue && typeof nextValue === "object" && !Array.isArray(nextValue)){
      if(Object.prototype.hasOwnProperty.call(nextValue, "buzzer") && nextValue.buzzer === null && !Object.prototype.hasOwnProperty.call(nextValue, "writtenAnswer")){
        nextValue = { ...nextValue, writtenAnswer: null };
      }
    }
    _mergeAtPath(SYNC.state, rawPath, nextValue);
    const rel = _stripRoomPrefix(rawPath);
    const tk = _topKey(rel);
    const patch = {};
    if(!tk){
      // root update: send only provided keys (merge semantics)
      if(nextValue && typeof nextValue === "object" && !Array.isArray(nextValue)) Object.assign(patch, nextValue);
      else patch._root = nextValue; // unlikely
    }else{
      patch[tk] = SYNC.state[tk];
    }
    return _action(patch);
  }
}

async function runTransaction(r, fn){
  // Emergency fast-path: do NOT block on an extra /state pull before the write.
  // The previous await _pullOnce(true) added visible delay to buzzer / players / cell updates.
  const p = String(r?.path || "");
  const cur = _get(SYNC.state, p);
  const next = fn(cur);
  if(next === undefined){
    return { committed: false, snapshot: _snapshot(cur) };
  }
  await update(r, next);
  const latest = _get(SYNC.state, p);
  return { committed: true, snapshot: _snapshot(latest) };
}

// ✅ تطبيق تحديثات من البث (Pusher) أو من /state مع نفس منطق إشعار onValue
function _notifyWatchersNow(){
  for(const [path, set] of _watchers.entries()){
    const v = _get(SYNC.state, path);
    let s;
    try{ s = JSON.stringify(v); }catch(e){ s = String(v); }
    if(_lastStr.get(path) !== s){
      _lastStr.set(path, s);
      set.forEach(cb => { try{ cb(_snapshot(v)); }catch(e){} });
    }
  }
}
function _applyFullState(nextState){
  SYNC.state = (nextState && typeof nextState === "object") ? nextState : {};
  SYNC.lastPullAt = Date.now();
  _notifyWatchersNow();
}
function _applyTopPatch(topPatch){
  if(!SYNC.state || typeof SYNC.state !== "object") SYNC.state = {};
  if(topPatch && typeof topPatch === "object"){
    for(const [k, v] of Object.entries(topPatch)){
      if(k === "_root"){
        SYNC.state = (v && typeof v === "object") ? v : {};
      }else{
        SYNC.state[k] = v; // patch عبارة عن Top-level keys فقط
      }
    }
  }
  _notifyWatchersNow();
}

// ✅ Polling manager (عند تفعيل Pusher نقلل السحب من /state)
let __POLL_T = null;
const __ORIG_POLL_MS = Number(SYNC.pollMs || 900);

function _startPolling(){
  try{ if(__POLL_T) clearInterval(__POLL_T); }catch(e){}
  __POLL_T = setInterval(() => { _pullOnce(false); }, Math.max(250, Number(SYNC.pollMs)||900));
}
function _setPollMs(ms){
  const n = Math.max(250, Number(ms)||0);
  if(!n) return;
  if(Number(SYNC.pollMs) === n && __POLL_T) return;
  SYNC.pollMs = n;
  _startPolling();
}

// ✅ Pusher: الإعداد يؤخذ من الـ Worker أولاً، مع بقاء دعم بارامترات الرابط كـ fallback
const __DEBUG_SYNC = (params.get("debug") === "1");
const __MANUAL_PUSHER_KEY = (params.get("pk") || "").trim();
const __MANUAL_PUSHER_CLUSTER = (params.get("pc") || "").trim();
const __MANUAL_PUSHER_CHANNEL = (params.get("pchan") || "").trim();
const __MANUAL_PUSHER_AUTH = (params.get("pa") || "").trim();
const __PUSHER_CHANNEL_FALLBACK = `private-horof-${code}`;

let __PUSHER_KEY = "";
let __PUSHER_CLUSTER = "";
let __PUSHER_CHANNEL = `private-room-${code}`;
let __PUSHER_AUTH = `${SYNC_BASE.replace(/\/$/,"")}/pusher/auth?room=${encodeURIComponent(code)}`;

let __pusher = null;
let __pusherCh = null;
let __pusherReady = false;
let __PUSHER_ENABLED = false;

async function _loadRealtimeConfig(){
  // 1) بارامترات الرابط لها أولوية إذا كانت موجودة (للاختبار السريع)
  if(__MANUAL_PUSHER_KEY && __MANUAL_PUSHER_CLUSTER){
    __PUSHER_KEY = __MANUAL_PUSHER_KEY;
    __PUSHER_CLUSTER = __MANUAL_PUSHER_CLUSTER;
    __PUSHER_CHANNEL = __MANUAL_PUSHER_CHANNEL || `private-room-${code}`;
    __PUSHER_AUTH = __MANUAL_PUSHER_AUTH || `${SYNC_BASE.replace(/\/$/,"")}/pusher/auth?room=${encodeURIComponent(code)}`;
    return { enabled:true, source:"query" };
  }

  // 2) الإعداد الرسمي من الـ Worker
  try{
    const url = `${SYNC_BASE.replace(/\/$/,"")}/pusher/config?room=${encodeURIComponent(code)}`;
    const r = await fetch(url, { cache:"no-store" });
    const j = await r.json().catch(()=>null);

    if(j && j.ok && j.pusher && j.pusher.enabled && j.pusher.key && j.pusher.cluster){
      __PUSHER_KEY = String(j.pusher.key || "").trim();
      __PUSHER_CLUSTER = String(j.pusher.cluster || "").trim();
      __PUSHER_CHANNEL = String(j.pusher.channel || `private-room-${code}`).trim();
      __PUSHER_AUTH = String(j.pusher.authEndpoint || `${SYNC_BASE.replace(/\/$/,"")}/pusher/auth?room=${encodeURIComponent(code)}`).trim();

      if(__PUSHER_AUTH.startsWith("/")){
        __PUSHER_AUTH = `${SYNC_BASE.replace(/\/$/,"")}${__PUSHER_AUTH}`;
      }
      return { enabled:true, source:"worker" };
    }
  }catch(e){
    if(__DEBUG_SYNC) console.log("[SYNC] pusher/config fetch failed", e);
  }

  return { enabled:false, source:"none" };
}

function _initPusherIfConfigured(){
  if(!__PUSHER_KEY || !__PUSHER_CLUSTER) return false;
  if(!window.Pusher) return false;

  try{ window.Pusher.logToConsole = false; }catch(e){}

  try{
    __pusher = new window.Pusher(__PUSHER_KEY, {
      cluster: __PUSHER_CLUSTER,
      forceTLS: true,
      channelAuthorization: {
        endpoint: __PUSHER_AUTH
      },
      enabledTransports: ["ws","wss"],
      disabledTransports: ["sockjs"]
    });

    __pusher.connection.bind("connected", () => {
      // مهم: لا نبطئ polling هنا، لأن الاتصال بالسوكت وحده لا يعني أن الاشتراك بالقناة نجح.
      // نبقي polling سريعًا إلى أن نحصل على subscription_succeeded أو أول patch فعلي.
      if(__DEBUG_SYNC) console.log("[SYNC] Pusher socket connected ⏳ waiting for channel subscription", { ch: __PUSHER_CHANNEL });
      _pullOnce(true); // sync once
      _dbgRender();
    });

    __pusher.connection.bind("disconnected", () => {
      __pusherReady = false;
      _setPollMs(__ORIG_POLL_MS);
      if(__DEBUG_SYNC) console.log("[SYNC] Pusher disconnected ⚠️ | Poll ->", __ORIG_POLL_MS);
      _dbgRender();
    });

    __pusher.connection.bind("error", (err) => {
      if(__DEBUG_SYNC) console.log("[SYNC] Pusher error", err);
    });

    __pusherCh = __pusher.subscribe(__PUSHER_CHANNEL);

    const onIncoming = (payload) => {
      // نتوقع { patch:{...}, rev, ts } أو { state:{...} }
      if(payload && payload.state && typeof payload.state === "object"){
        _applyFullState(payload.state);
        return;
      }
      if(payload && payload.patch && typeof payload.patch === "object"){
        _applyTopPatch(payload.patch);
        return;
      }
      // fallback
      _pullOnce(true);
    };

    __pusherCh.bind("pusher:subscription_succeeded", () => {
      __pusherReady = true;
      _setPollMs(1200);
      if(__DEBUG_SYNC) console.log("[SYNC] subscription_succeeded ✅ | Poll -> 1200ms", { ch: __PUSHER_CHANNEL });
      _dbgRender();
      _pullOnce(true);
    });

    __pusherCh.bind("state", (payload) => {
      __pusherReady = true;
      _setPollMs(1200);
      onIncoming(payload);
    });
    __pusherCh.bind("patch", (payload) => {
      __pusherReady = true;
      _setPollMs(1200);
      onIncoming(payload);
    });

    // لو فشل الاشتراك (اختلاف اسم القناة)، جرّب fallback مرة واحدة
    let __triedFallback = false;
    __pusherCh.bind("pusher:subscription_error", (status) => {
      __pusherReady = false;
      _setPollMs(__ORIG_POLL_MS);
      if(__triedFallback) return;
      __triedFallback = true;
      if(__DEBUG_SYNC) console.log("[SYNC] subscription_error", status, "-> trying fallback", __PUSHER_CHANNEL_FALLBACK);
      try{ __pusher.unsubscribe(__PUSHER_CHANNEL); }catch(e){}
      try{
        __pusherCh = __pusher.subscribe(__PUSHER_CHANNEL_FALLBACK);
        __pusherCh.bind("pusher:subscription_succeeded", () => {
          __pusherReady = true;
          _setPollMs(1200);
          if(__DEBUG_SYNC) console.log("[SYNC] fallback subscription_succeeded ✅ | Poll -> 1200ms", { ch: __PUSHER_CHANNEL_FALLBACK });
          _dbgRender();
          _pullOnce(true);
        });
        __pusherCh.bind("state", (payload) => {
          __pusherReady = true;
          _setPollMs(1200);
          onIncoming(payload);
        });
        __pusherCh.bind("patch", (payload) => {
          __pusherReady = true;
          _setPollMs(1200);
          onIncoming(payload);
        });
        _dbgRender();
      }catch(e){}
    });

    // نافذة تشخيص
    window.__SYNC_DIAG = window.__SYNC_DIAG || {};
    window.__SYNC_DIAG.mode = "pusher+do";
    window.__SYNC_DIAG.pusher = {
      cluster: __PUSHER_CLUSTER,
      channel: __PUSHER_CHANNEL,
      auth: __PUSHER_AUTH,
      connected: () => __pusherReady
    };

    if(__DEBUG_SYNC) console.log("[SYNC] mode = pusher+do ✅", window.__SYNC_DIAG.pusher);

    return true;
  }catch(e){
    if(__DEBUG_SYNC) console.log("[SYNC] Pusher init failed", e);
    return false;

    const SOUND = (function(){
      const bellCandidates  = ["rong.mp3","rong.wav","rong.m4a","rong.ogg"];
      const musicCandidates = ["vois.mp3","vois.wav","vois.m4a","vois.ogg"];

      function makeAudio(cands, opts){
        const a = new Audio();
        a.preload = "auto";
        a.playsInline = true;
        a.crossOrigin = "anonymous";
        if(opts && "loop" in opts) a.loop = !!opts.loop;
        if(opts && typeof opts.volume === "number") a.volume = Math.max(0, Math.min(1, opts.volume));

        let i = 0;
        const tryNext = () => {
          if(i >= cands.length) return;
          a.src = cands[i++] + vq;
          try{ a.load(); }catch(e){}
        };
        a.addEventListener("error", () => { tryNext(); }, { passive:true });
        tryNext();
        return a;
      }

      const api = {
        ready:false,
        unlocked:false,
        bell:null,
        music:null,
        _unlockBound:false,
        _lastPrimeAt:0,
        _pendingRetryBell:false,
        _pendingRetryMusic:false,
        _primeOne(a){
          if(!a) return;
          const v = Number.isFinite(a.volume) ? a.volume : 1;
          try{
            a.volume = 0;
            const p = a.play();
            const done = () => {
              try{ a.pause(); }catch(e){}
              try{ a.currentTime = 0; }catch(e){}
              try{ a.volume = v; }catch(e){}
            };
            if(p && typeof p.then === "function"){
              p.then(() => {
                this.unlocked = true;
                done();
              }).catch(() => {
                this.unlocked = false;
                done();
              });
            }else{
              this.unlocked = true;
              done();
            }
          }catch(e){
            this.unlocked = false;
          }
        },
        prime(){
          const now = Date.now();
          if(now - this._lastPrimeAt < 300) return;
          this._lastPrimeAt = now;
          this._primeOne(this.bell);
          this._primeOne(this.music);
        },
        bindUnlock(){
          if(this._unlockBound) return;
          this._unlockBound = true;
          const onUserGesture = () => { this.prime(); };
          window.addEventListener("pointerdown", onUserGesture, { capture:true, passive:true });
          window.addEventListener("touchstart",  onUserGesture, { capture:true, passive:true });
          window.addEventListener("click",       onUserGesture, { capture:true, passive:true });
          window.addEventListener("keydown",     onUserGesture, { capture:true });
          document.addEventListener("visibilitychange", () => {
            if(document.visibilityState === "visible"){
              this.unlocked = false;
            }
          }, { passive:true });
          window.addEventListener("pageshow", () => {
            this.unlocked = false;
          }, { passive:true });
        },
        init(){
          if(!this.ready){
            this.ready = true;
            this.bell  = makeAudio(bellCandidates,  { volume:0.95, loop:false });
            this.music = makeAudio(musicCandidates, { volume:0.95, loop:false }); // ✅ (5) صوت عالي
          }
          this.bindUnlock();
        },
        _playWithRetry(kind){
          this.init();
          const a = kind === "music" ? this.music : this.bell;
          if(!a) return false;
          try{
            a.pause();
            a.currentTime = 0;
          }catch(e){}

          try{
            const p = a.play();
            if(p && typeof p.then === "function"){
              p.then(() => {
                this.unlocked = true;
              }).catch(() => {
                this.unlocked = false;
                const retryFlag = kind === "music" ? "_pendingRetryMusic" : "_pendingRetryBell";
                if(this[retryFlag]) return;
                this[retryFlag] = true;
                this.prime();
                setTimeout(() => {
                  this[retryFlag] = false;
                  try{
                    a.pause();
                    a.currentTime = 0;
                    const p2 = a.play();
                    if(p2 && typeof p2.then === "function"){
                      p2.then(() => { this.unlocked = true; }).catch(() => { this.unlocked = false; });
                    }else{
                      this.unlocked = true;
                    }
                  }catch(e){
                    this.unlocked = false;
                  }
                }, 60);
              });
            }else{
              this.unlocked = true;
            }
            return true;
          }catch(e){
            this.unlocked = false;
            return false;
          }
        },
        playBell(){
          return this._playWithRetry("bell");
        },
        playMusic(){
          return this._playWithRetry("music");
        }
      };
      return api;
    })();

    function fallbackBeep(){
      try{
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        const ctx = new AC();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.value = 880;
        g.gain.value = 0.12;
        o.connect(g); g.connect(ctx.destination);
        o.start();
        setTimeout(() => {
          o.stop();
          ctx.close();
        }, 300);
      }catch(e){}
    }

    function detectHexBBox(img){
      const nw = img.naturalWidth, nh = img.naturalHeight;
      const maxW = 700;
      const scale = Math.min(1, maxW / nw);

      const cw = Math.round(nw * scale);
      const ch = Math.round(nh * scale);

      const canvas = document.createElement("canvas");
      canvas.width = cw; canvas.height = ch;
      const ctx = canvas.getContext("2d", { willReadFrequently:true });
      ctx.drawImage(img, 0, 0, cw, ch);

      const data = ctx.getImageData(0,0,cw,ch).data;

      let minX = cw, minY = ch, maxX = -1, maxY = -1;
      let found = false;

      const step = 2;
      for(let y=0; y<ch; y+=step){
        for(let x=0; x<cw; x+=step){
          const i = (y*cw + x) * 4;
          const r = data[i], g = data[i+1], b = data[i+2];
          const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
          const avg = (r+g+b)/3;

          if(avg > 180 && (mx - mn) < 60){
            found = true;
            if(x < minX) minX = x;
            if(y < minY) minY = y;
            if(x > maxX) maxX = x;
            if(y > maxY) maxY = y;
          }
        }
      }

      if(!found){
        return { x0:0.12, y0:0.04, x1:0.90, y1:0.95 };
      }

      minX = Math.max(0, minX - 2);
      minY = Math.max(0, minY - 2);
      maxX = Math.min(cw - 1, maxX + 2);
      maxY = Math.min(ch - 1, maxY + 2);

      return {
        x0: minX / cw,
        y0: minY / ch,
        x1: (maxX + 1) / cw,
        y1: (maxY + 1) / ch,
      };
    }

    function hexToRgba(hex, alpha){
      const raw = String(hex || '').trim();
      if(!raw) return `rgba(123,95,191,${alpha})`;
      if(raw.startsWith('rgba(')){
        const parts = raw.slice(5,-1).split(',').map(s=>s.trim());
        if(parts.length >= 3) return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
      }
      if(raw.startsWith('rgb(')){
        const parts = raw.slice(4,-1).split(',').map(s=>s.trim());
        if(parts.length >= 3) return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
      }
      let h = raw.replace('#','');
      if(h.length === 3) h = h.split('').map(ch=>ch+ch).join('');
      if(h.length !== 6) return `rgba(123,95,191,${alpha})`;
      const n = parseInt(h, 16);
      const r = (n >> 16) & 255;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function parseCssColor(rawColor){
      const raw = String(rawColor || '').trim();
      if(!raw) return null;

      if(raw.startsWith('#')){
        let h = raw.slice(1);
        if(h.length === 3) h = h.split('').map(ch => ch + ch).join('');
        if(h.length === 6){
          const n = parseInt(h, 16);
          return {
            r: (n >> 16) & 255,
            g: (n >> 8) & 255,
            b: n & 255,
            a: 1
          };
        }
      }

      const m = raw.match(/^rgba?\(\s*([0-9.]+)\s*,\s*([0-9.]+)\s*,\s*([0-9.]+)(?:\s*,\s*([0-9.]+))?\s*\)$/i);
      if(m){
        return {
          r: Math.max(0, Math.min(255, Number(m[1]) || 0)),
          g: Math.max(0, Math.min(255, Number(m[2]) || 0)),
          b: Math.max(0, Math.min(255, Number(m[3]) || 0)),
          a: m[4] == null ? 1 : Math.max(0, Math.min(1, Number(m[4]) || 0))
        };
      }

      return null;
    }

    function getReadableTextColor(bgColor){
      const rgb = parseCssColor(bgColor);
      if(!rgb) return '#fff';
      const toLinear = (v) => {
        const n = v / 255;
        return n <= 0.04045 ? n / 12.92 : Math.pow((n + 0.055) / 1.055, 2.4);
      };
      const luminance = (0.2126 * toLinear(rgb.r)) + (0.7152 * toLinear(rgb.g)) + (0.0722 * toLinear(rgb.b));
      return luminance > 0.42 ? '#111' : '#fff';
    }

    function normalizeTimer(t){

    function computeTimerView(t){
      const now = Date.now();
      const sel = Number(t.sel || 10);
      const dur = Number(t.dur || sel);
      const running = !!t.running;
      const startTs = Number(t.startTs || 0);
      const doneFlag = !!t.done;

      let remaining = sel;
      if(running && startTs){
        remaining = dur - Math.floor((now - startTs) / 1000);
      }else{
        remaining = sel;
      }
      if(!Number.isFinite(remaining)) remaining = sel;
      remaining = Math.max(0, remaining);

      const done = doneFlag || (running && remaining === 0);
      const inLast5 = running && remaining > 0 && remaining <= 5;
      return { sel, dur, running, startTs, remaining, done, inLast5 };
    }

}

    function getNeighborsForCell(row, col, board){
      const size = Math.max(1, Number(board?.size || 5));
      const shape = normalizeCellShape(board?.shape || "hex");
      const out = [];
      if(shape === "square"){
        out.push([row, col-1], [row, col+1], [row-1, col], [row+1, col]);
      }else{
        const odd = (row % 2) === 1;
        out.push([row, col-1], [row, col+1]);
        if(odd){
          out.push([row-1, col], [row-1, col+1], [row+1, col], [row+1, col+1]);
        }else{
          out.push([row-1, col-1], [row-1, col], [row+1, col-1], [row+1, col]);
        }
        if(shape === "pentagon"){
          out.push([row-1, col], [row+1, col]);
        }
      }
      return out.filter(([rr,cc]) => rr>=0 && rr<size && cc>=0 && cc<size);
    }

    function computeWinners(mapStatesForMap, board){
      const size = Math.max(1, Number(board?.size || 5));
      const getSt = (r,c) => Number(mapStatesForMap?.[cellKey(r,c)] ?? 0);

      const qG = [];
      const seenG = new Set();
      for(let r=0;r<size;r++){
        if(getSt(r,0) === 2){
          qG.push([r,0]);
          seenG.add(cellKey(r,0));
        }
      }
      let greenWin = false;
      while(qG.length){
        const [r,c] = qG.shift();
        if(c === size-1){ greenWin = true; break; }
        for(const [rr,cc] of getNeighborsForCell(r,c,board)){
          const k = cellKey(rr,cc);
          if(seenG.has(k)) continue;
          if(getSt(rr,cc) === 2){
            seenG.add(k);
            qG.push([rr,cc]);
          }
        }
      }

      const qO = [];
      const seenO = new Set();
      for(let c=0;c<size;c++){
        if(getSt(0,c) === 3){
          qO.push([0,c]);
          seenO.add(cellKey(0,c));
        }
      }
      let orangeWin = false;
      while(qO.length){
        const [r,c] = qO.shift();
        if(r === size-1){ orangeWin = true; break; }
        for(const [rr,cc] of getNeighborsForCell(r,c,board)){
          const k = cellKey(rr,cc);
          if(seenO.has(k)) continue;
          if(getSt(rr,cc) === 3){
            seenO.add(k);
            qO.push([rr,cc]);
          }
        }
      }

      return { greenWin, orangeWin };
    }

    async function assignCurrentCellToTeam(team){
      if(role !== "host") return;
      if(LIVE.room.status !== "started") return;
      if(team !== "green" && team !== "orange") return;

      const cur = LIVE.room.current || {};
      const board = getBoard(LIVE.room);
      const boardKey = Number(LIVE.room.activeMap || 0);
      const size = Math.max(1, Number(board.size || 5));
      const r = Number(cur.row);
      const c = Number(cur.col);

      if(!Number.isFinite(r) || !Number.isFinite(c)) return;
      if(r < 0 || r >= size || c < 0 || c >= size) return;

      const k = cellKey(r,c);
      const mapStatesNow = (LIVE.room.mapStates && LIVE.room.mapStates[String(boardKey)]) ? LIVE.room.mapStates[String(boardKey)] : {};
      const currentState = Number(mapStatesNow?.[k] ?? 0);
      if(currentState !== 1) return;

      const next = team === "green" ? 2 : 3;
      const nextStates = { ...(mapStatesNow || {}) };
      nextStates[k] = next;

      const winners = computeWinners(nextStates, board);
      const prevWin = (LIVE.room.winState && LIVE.room.winState[String(boardKey)]) ? LIVE.room.winState[String(boardKey)] : { greenWin:false, orangeWin:false };

      let winEvent = null;
      const greenNew = !!winners.greenWin && !prevWin.greenWin;
      const orangeNew = !!winners.orangeWin && !prevWin.orangeWin;

      const scoresNow = (LIVE.room.scores && typeof LIVE.room.scores === "object") ? LIVE.room.scores : { green:0, orange:0 };
      let nextGreenScore = Number(scoresNow.green ?? scoresNow.a ?? 0) || 0;
      let nextOrangeScore = Number(scoresNow.orange ?? scoresNow.b ?? 0) || 0;

      if(greenNew || orangeNew){
        let winTeam = team;
        if(greenNew && !orangeNew) winTeam = "green";
        else if(orangeNew && !greenNew) winTeam = "orange";
        if(winTeam === "green") nextGreenScore += 1;
        else nextOrangeScore += 1;

        const totalRounds = normalizeWinRounds(LIVE.room?.round?.targetWins || LIVE.room?.settings?.winRounds || 1);
        const endedRound = Math.max(1, Number(LIVE.room?.round?.current || (Number(scoresNow.green ?? 0) + Number(scoresNow.orange ?? 0) + 1) || 1));
        const isFinal = endedRound >= totalRounds;
        let finalTeam = winTeam;
        if(isFinal){
          if(nextGreenScore > nextOrangeScore) finalTeam = "green";
          else if(nextOrangeScore > nextGreenScore) finalTeam = "orange";
        }
        winEvent = {
          team: finalTeam,
          roundWinner: winTeam,
          ts: Date.now(),
          map: boardKey,
          greenScore: nextGreenScore,
          orangeScore: nextOrangeScore,
          targetWins: totalRounds,
          totalRounds,
          endedRound,
          isFinal,
          nextRound: Math.min(totalRounds, endedRound + 1)
        };
      }

      const letter = board?.letters?.[r]?.[c] || cur.letter || "";
      const updates = {};
      updates[`rooms/${code}/mapStates/${boardKey}/${k}`] = next;
      updates[`rooms/${code}/buzzer`] = null;
      updates[`rooms/${code}/current`] = {
        ...cur,
        letter,
        row: r,
        col: c,
        map: boardKey
      };
      updates[`rooms/${code}/winState/${boardKey}`] = { greenWin: !!winners.greenWin, orangeWin: !!winners.orangeWin };
      if(winEvent){
        updates[`rooms/${code}/winEvent`] = winEvent;
        updates[`rooms/${code}/scores/green`] = nextGreenScore;
        updates[`rooms/${code}/scores/orange`] = nextOrangeScore;
        updates[`rooms/${code}/scores/a`] = nextGreenScore;
        updates[`rooms/${code}/scores/b`] = nextOrangeScore;
        updates[`rooms/${code}/round/current`] = Math.max(1, Number(winEvent.isFinal ? winEvent.endedRound : winEvent.nextRound));
        updates[`rooms/${code}/round/winner`] = winEvent.isFinal ? winEvent.team : null;
      }

      await update(ref(db), updates);
    }

    function resolveStableBuzzer(rawBuzzer, timerLike){
      const rawSig = getBuzzerSig(rawBuzzer);
      const timer = normalizeTimer(timerLike || {});

      if(!rawSig){
        STABLE_BUZZER = null;
        return null;
      }

      if(!STABLE_BUZZER || !getBuzzerSig(STABLE_BUZZER)){
        STABLE_BUZZER = rawBuzzer;
        return STABLE_BUZZER;
      }

      const stableTs = Number(STABLE_BUZZER?.ts || 0);
      const rawTs = Number(rawBuzzer?.ts || 0);

      // أثناء نفس الجولة: لا نسمح لجرس أحدث أن يستبدل الجرس الأول بصرياً.
      // وإذا وصل جرس أقدم (تأخر بالشبكة) نعتمد الأقدم لأنه الأقرب لأن يكون الفائز الحقيقي.
      if(timer.running || stableTs){
        if(rawTs && stableTs && rawTs < stableTs){
          STABLE_BUZZER = rawBuzzer;

        return STABLE_BUZZER;
      }

      STABLE_BUZZER = rawBuzzer;
      return STABLE_BUZZER;

    async function claimBuzzerSafely(mm){
      // ✅ الجرس الآن يُحسم رسميًا من السيرفر عبر type:"buzz"
      // وليس من runTransaction المحلي، حتى لا يتبدل الفائز عند الضغطات المتقاربة.
      await _pullOnce(true);

      const latestBefore = _get(SYNC.state, `rooms/${code}/buzzer`);
      if(latestBefore && latestBefore.ts){
        return { committed:false, winner: latestBefore, reason:"LOCKED_BEFORE" };
      }

      const attemptTs = Date.now();
      const res = await _action({
        type: "buzz",
        pid,
        name: mm.name,
        team: mm.team,
        ts: attemptTs
      }).catch(() => null);

      // ✅ دائمًا نسحب آخر حالة بعد المحاولة، لأن السيرفر هو الحكم النهائي.
      await _pullOnce(true);
      const finalWinner = _get(SYNC.state, `rooms/${code}/buzzer`) || (res && res.winner) || null;
      const finalSig = getBuzzerSig(finalWinner);
      const mySig = `${String(pid||"")}|${Number(attemptTs)}`;

      return {
        committed: !!(res && res.ok && res.accepted === true && finalSig === mySig),
        winner: finalWinner,
        attemptedSig: mySig,
        finalSig,
        reason: (res && res.reason) || ""
      };
    }

    // ✅ (2) منع الزيادة عن 13 لاعب (قصّ الزائدين بأقدم joinedAt)
    let PRUNE_IN_FLIGHT = false;
    let LAST_PRUNE_AT = 0;

    async function prunePlayersIfOverLimit(room){
      try{
        if(PRUNE_IN_FLIGHT) return;
        const now = Date.now();
        if(now - LAST_PRUNE_AT < 800) return;

        const players = room?.players || {};
        const count = Object.keys(players).length;
        if(count <= MAX_PLAYERS) return;

        PRUNE_IN_FLIGHT = true;
        LAST_PRUNE_AT = now;

        const playersRef = ref(db, `rooms/${code}/players`);
        await runTransaction(playersRef, (cur) => {
          if(!cur || typeof cur !== "object") return cur;

          const entries = Object.entries(cur).map(([id,p]) => ({
            id,
            joinedAt: Number(p?.joinedAt || 0)
          }));

          entries.sort((a,b) => (a.joinedAt - b.joinedAt) || (String(a.id).localeCompare(String(b.id))));
          const keep = entries.slice(0, MAX_PLAYERS).map(x => x.id);

          const out = {};
          for(const id of keep){
            out[id] = cur[id];
          }
          return out;
        }, { applyLocally:false });

      }catch(e){
        // تجاهل
      }finally{
        PRUNE_IN_FLIGHT = false;
      }
    }

    const CUSTOM_Q_PERSIST = {
      lastRoomSig: "",
      lastLocalSig: "",
      lastRemoteSig: "",
      lastPushTs: 0,
      pushing: false,

    function getCustomQuestionsStorageKey(){
      try{
        const candidates = [
          localStorage.getItem("sandooq_user_email"),
          localStorage.getItem("user_email"),
          localStorage.getItem("auth_email"),
          localStorage.getItem("customer_email")
        ].map(v => String(v || "").trim().toLowerCase()).filter(Boolean);

    function normalizeCustomQuestionEntry(item){
      if(!item || typeof item !== "object") return null;
      const q = String(item.q || "").trim();
      const a = String(item.a || "").trim();
      if(!q && !a) return null;
      return { q, a };
    }

    function normalizeCustomQuestionsMap(raw){
      const out = {};
      const src = (raw && typeof raw === "object") ? raw : {};
      for(const L of GAME_LETTERS){
        const v = src[L];
        let arr = [];
        if(Array.isArray(v)) arr = v;
        else if(v && typeof v === "object") arr = [v];
        const cleaned = arr.map(normalizeCustomQuestionEntry).filter(Boolean).slice(0, MAX_CUSTOM_PER_LETTER);
        if(cleaned.length) out[L] = cleaned;
      }
      return out;
    }

    function parseApiTs(v){
      if(!v) return 0;
      if(typeof v === "number" && Number.isFinite(v)) return Number(v);
      const n = Date.parse(String(v));
      return Number.isFinite(n) ? n : 0;
    }

    function loadPersistedCustomQuestionsEnvelope(){
      try{
        const raw = localStorage.getItem(getCustomQuestionsStorageKey());
        if(!raw) return { updatedAt:0, customQuestions:{} };
        const parsed = JSON.parse(raw);
        return {
          updatedAt: Number(parsed?.updatedAt || 0),
          customQuestions: normalizeCustomQuestionsMap(parsed?.customQuestions || {})
        };
      }catch(e){
        return { updatedAt:0, customQuestions:{} };
      }
    }

    function savePersistedCustomQuestions(customQuestions, updatedAt){
      try{
        const clean = normalizeCustomQuestionsMap(customQuestions || {});
        localStorage.setItem(getCustomQuestionsStorageKey(), JSON.stringify({
          version: 4,
          updatedAt: Number(updatedAt || Date.now()) || Date.now(),
          customQuestions: clean
        }));
      }catch(e){}
    }

    function getStoredApiToken(){
      const keys = ["sandooq_token_v1", "sandooq_session_v1", "token", "auth_token"];
      try{
        for(const k of keys){
          const v = localStorage.getItem(k);
          if(v && String(v).trim()) return String(v).trim();
        }
      }catch(e){}
      try{
        for(const k of keys){
          const v = sessionStorage.getItem(k);
          if(v && String(v).trim()) return String(v).trim();
        }
      }catch(e){}
      return "";
    }

    function getCustomQuestionsApiHeaders(withJson=false){
      const headers = { "Accept": "application/json" };
      if(withJson) headers["Content-Type"] = "application/json";
      const token = getStoredApiToken();
      if(token) headers["Authorization"] = `Bearer ${token}`;
      return headers;
    }

    function getRemoteCustomQuestionsEnvelope(){
      return {
        updatedAt: Number(CUSTOM_Q_PERSIST.remote?.updatedAt || 0),
        customQuestions: normalizeCustomQuestionsMap(CUSTOM_Q_PERSIST.remote?.customQuestions || {})
      };
    }

    async function fetchRemoteCustomQuestionsEnvelope(){
      const res = await fetch(CUSTOM_Q_API_URL, {
        method: "GET",
        credentials: "include",
        cache: "no-store",
        headers: getCustomQuestionsApiHeaders(false)
      });
      const j = await res.json().catch(() => null);
      if(!res.ok || !j?.ok){
        throw new Error(String(j?.error || `HTTP_${res.status || 0}`));
      }
      return {
        updatedAt: Math.max(parseApiTs(j?.updated_at), parseApiTs(j?.created_at)),
        customQuestions: normalizeCustomQuestionsMap(j?.questions || {})
      };
    }

    async function saveRemoteCustomQuestionsEnvelope(customQuestions, updatedAt){
      const clean = normalizeCustomQuestionsMap(customQuestions || {});
      const desiredTs = Number(updatedAt || Date.now()) || Date.now();
      const res = await fetch(CUSTOM_Q_API_URL.replace(/\?game=horof$/, ""), {
        method: "POST",
        credentials: "include",
        cache: "no-store",
        headers: getCustomQuestionsApiHeaders(true),
        body: JSON.stringify({ game: "horof", questions: clean })
      });
      const j = await res.json().catch(() => null);
      if(!res.ok || !j?.ok){
        throw new Error(String(j?.error || `HTTP_${res.status || 0}`));
      }
      const apiTs = Math.max(parseApiTs(j?.updated_at), parseApiTs(j?.created_at), desiredTs);
      CUSTOM_Q_PERSIST.remote = { updatedAt: apiTs, customQuestions: clean };
      CUSTOM_Q_PERSIST.remoteLoaded = true;
      CUSTOM_Q_PERSIST.lastRemoteSig = `${apiTs}|${JSON.stringify(clean)}`;
      return { updatedAt: apiTs, customQuestions: clean };
    }

    function pickNewestCustomQuestionsEnvelope(roomEnv, localEnv, remoteEnv){
      const candidates = [
        { source:"room", updatedAt:Number(roomEnv?.updatedAt || 0), customQuestions: normalizeCustomQuestionsMap(roomEnv?.customQuestions || {}) },
        { source:"local", updatedAt:Number(localEnv?.updatedAt || 0), customQuestions: normalizeCustomQuestionsMap(localEnv?.customQuestions || {}) },
        { source:"remote", updatedAt:Number(remoteEnv?.updatedAt || 0), customQuestions: normalizeCustomQuestionsMap(remoteEnv?.customQuestions || {}) }
      ];
      candidates.sort((a,b) => {
        if(Number(b.updatedAt || 0) !== Number(a.updatedAt || 0)) return Number(b.updatedAt || 0) - Number(a.updatedAt || 0);
        const weight = { remote:3, room:2, local:1 };
        return (weight[b.source] || 0) - (weight[a.source] || 0);
      });
      return candidates[0] || { source:"room", updatedAt:0, customQuestions:{} };
    }

    async function pushCustomQuestionsToRoom(customQuestions, updatedAt){
      if(role !== "host") return;
      const clean = normalizeCustomQuestionsMap(customQuestions || {});
      const ts = Number(updatedAt || Date.now()) || Date.now();
      if(CUSTOM_Q_PERSIST.pushingRoom && CUSTOM_Q_PERSIST.lastRoomPushTs === ts) return;
      if(CUSTOM_Q_PERSIST.lastRoomPushTs === ts){
        const curTs = Number(LIVE.room?.customQuestionsUpdatedAt || 0);
        if(curTs === ts) return;
      }
      CUSTOM_Q_PERSIST.pushingRoom = true;
      CUSTOM_Q_PERSIST.lastRoomPushTs = ts;
      try{
        const updates = {};
        updates[`rooms/${code}/customQuestions`] = clean;
        updates[`rooms/${code}/customQuestionsUpdatedAt`] = ts;
        await update(ref(db), updates);
      }catch(e){}
      CUSTOM_Q_PERSIST.pushingRoom = false;
    }

    function getRoomWithPersistentCustomQuestions(room){
      const baseRoom = (room && typeof room === "object") ? room : {};
      const localEnv = loadPersistedCustomQuestionsEnvelope();
      const remoteEnv = getRemoteCustomQuestionsEnvelope();
      const roomEnv = {
        updatedAt: Number(baseRoom?.customQuestionsUpdatedAt || 0),
        customQuestions: normalizeCustomQuestionsMap(baseRoom?.customQuestions || {})
      };
      const best = pickNewestCustomQuestionsEnvelope(roomEnv, localEnv, remoteEnv);
      return {
        ...baseRoom,
        customQuestions: best.customQuestions,
        customQuestionsUpdatedAt: Number(best.updatedAt || 0)
      };
    }

    async function hydratePersistentCustomQuestionsFromApi(force=false){
      if(role !== "host") return;
      const now = Date.now();
      if(CUSTOM_Q_PERSIST.remoteLoading) return;
      if(CUSTOM_Q_PERSIST.remoteLoaded && !force) return;
      if(!force && CUSTOM_Q_PERSIST.lastFetchFailAt && (now - CUSTOM_Q_PERSIST.lastFetchFailAt) < 4000) return;
      CUSTOM_Q_PERSIST.remoteLoading = true;
      try{
        const remoteEnv = await fetchRemoteCustomQuestionsEnvelope();
        CUSTOM_Q_PERSIST.remote = remoteEnv;
        CUSTOM_Q_PERSIST.remoteLoaded = true;

        const liveRoom = (LIVE.room && typeof LIVE.room === "object") ? LIVE.room : {};
        const roomEnv = {
          updatedAt: Number(liveRoom?.customQuestionsUpdatedAt || 0),
          customQuestions: normalizeCustomQuestionsMap(liveRoom?.customQuestions || {})
        };
        const localEnv = loadPersistedCustomQuestionsEnvelope();
        const best = pickNewestCustomQuestionsEnvelope(roomEnv, localEnv, remoteEnv);

        savePersistedCustomQuestions(best.customQuestions, best.updatedAt);
        CUSTOM_Q_PERSIST.lastLocalSig = `${Number(best.updatedAt || 0)}|${JSON.stringify(best.customQuestions || {})}`;

        if(best.updatedAt > Number(remoteEnv?.updatedAt || 0) && best.source !== "remote"){
          try{ await saveRemoteCustomQuestionsEnvelope(best.customQuestions, best.updatedAt); }catch(e){}
        }

        if(best.updatedAt > Number(roomEnv?.updatedAt || 0)){
          await pushCustomQuestionsToRoom(best.customQuestions, best.updatedAt);
        }

        LIVE.room = normalizeLiveRoom({
          ...(LIVE.room || {}),
          customQuestions: best.customQuestions,
          customQuestionsUpdatedAt: Number(best.updatedAt || 0)
        });
        scheduleRender();
      }catch(e){
        CUSTOM_Q_PERSIST.lastFetchFailAt = Date.now();
      }finally{
        CUSTOM_Q_PERSIST.remoteLoading = false;
      }
    }

    async function syncPersistentCustomQuestions(room){
      if(role !== "host") return;

      if(!CUSTOM_Q_PERSIST.remoteLoaded && !CUSTOM_Q_PERSIST.remoteLoading){
        hydratePersistentCustomQuestionsFromApi(false);
      }

      const liveRoom = (room && typeof room === "object") ? room : {};
      const localEnv = loadPersistedCustomQuestionsEnvelope();
      const remoteEnv = getRemoteCustomQuestionsEnvelope();
      const roomEnv = {
        updatedAt: Number(liveRoom?.customQuestionsUpdatedAt || 0),
        customQuestions: normalizeCustomQuestionsMap(liveRoom?.customQuestions || {})
      };

      const roomSig = `${roomEnv.updatedAt}|${JSON.stringify(roomEnv.customQuestions)}`;
      const localSig = `${localEnv.updatedAt}|${JSON.stringify(localEnv.customQuestions)}`;
      const remoteSig = `${remoteEnv.updatedAt}|${JSON.stringify(remoteEnv.customQuestions)}`;
      CUSTOM_Q_PERSIST.lastRoomSig = roomSig;
      CUSTOM_Q_PERSIST.lastLocalSig = localSig;
      CUSTOM_Q_PERSIST.lastRemoteSig = remoteSig;

      const best = pickNewestCustomQuestionsEnvelope(roomEnv, localEnv, remoteEnv);
      const bestSig = `${Number(best.updatedAt || 0)}|${JSON.stringify(best.customQuestions || {})}`;

      if(bestSig !== localSig){
        savePersistedCustomQuestions(best.customQuestions, best.updatedAt);
        CUSTOM_Q_PERSIST.lastLocalSig = bestSig;
      }

      if(bestSig !== roomSig && Number(best.updatedAt || 0) > Number(roomEnv.updatedAt || 0) && !CUSTOM_Q_PERSIST.pushingRoom){
        pushCustomQuestionsToRoom(best.customQuestions, best.updatedAt);
      }

      if(CUSTOM_Q_PERSIST.remoteLoaded && bestSig !== remoteSig && Number(best.updatedAt || 0) > Number(remoteEnv.updatedAt || 0) && Number(best.updatedAt || 0) !== CUSTOM_Q_PERSIST.lastPushTs && !CUSTOM_Q_PERSIST.pushing){
        CUSTOM_Q_PERSIST.pushing = true;
        CUSTOM_Q_PERSIST.lastPushTs = Number(best.updatedAt || 0);
        try{
          await saveRemoteCustomQuestionsEnvelope(best.customQuestions, best.updatedAt);
        }catch(e){}
        CUSTOM_Q_PERSIST.pushing = false;
      }
    }

    function getCustomList(room, letter){
      const sourceRoom = (role === "host") ? getRoomWithPersistentCustomQuestions(room || {}) : (room || {});
      const cq = sourceRoom?.customQuestions || {};
      const v = cq?.[letter];
      if(Array.isArray(v)) return v.filter(x => x && (x.q || x.a));
      if(v && typeof v === "object") return [v].filter(x => x && (x.q || x.a));
      return [];

    function createPairEl(qVal="", aVal=""){
      const wrap = document.createElement("div");
      wrap.className = "cqPair";
      wrap.innerHTML = `
        <div class="cqLbl">السؤال</div>
        <textarea class="cqTA cqQ" rows="1" placeholder="اكتب هنا السؤال"></textarea>
        <div class="cqLbl">الجواب</div>
        <textarea class="cqTA cqA" rows="1" placeholder="اكتب هنا الجواب"></textarea>
      `;
      const q = wrap.querySelector(".cqQ");
      const a = wrap.querySelector(".cqA");
      q.value = qVal || "";
      a.value = aVal || "";
      requestAnimationFrame(()=>{ autosizeTA(q); autosizeTA(a); });

      [q,a].forEach(ta=>{
        ta.addEventListener("input", ()=> autosizeTA(ta));
      });

      return wrap;

    function buildLetterEditor(item, letter, room){
      const body = item.querySelector(".cqLetterBody");
      if(!body) return;
      body.innerHTML = "";

      const pairsWrap = document.createElement("div");
      pairsWrap.className = "cqPairs";

      // ✅ (9) قصّ العرض/التحميل على 7
      const existing = getCustomList(room, letter).slice(0, MAX_CUSTOM_PER_LETTER);
      if(existing.length){
        existing.forEach(obj => pairsWrap.appendChild(createPairEl(String(obj.q||""), String(obj.a||""))));
      }else{
        pairsWrap.appendChild(createPairEl("", ""));
      }

      const addWrap = document.createElement("div");
      addWrap.className = "cqAddWrap";
      addWrap.innerHTML = `<button class="cqAddBtn" type="button" aria-label="إضافة سؤال">+</button>`;

      const saveBtn = document.createElement("button");
      saveBtn.className = "btn btnYellow cqSaveFixed";
      saveBtn.type = "button";
      saveBtn.textContent = "حفظ";

      const savedMsg = document.createElement("div");
      savedMsg.className = "cqSavedMsg";

      body.appendChild(pairsWrap);
      body.appendChild(addWrap);
      body.appendChild(saveBtn);
      body.appendChild(savedMsg);

      const addBtn = addWrap.querySelector(".cqAddBtn");

      function refreshAddState(){
        const count = pairsWrap.querySelectorAll(".cqPair").length;
        if(count >= MAX_CUSTOM_PER_LETTER){
          addBtn.classList.add("disabled");
        }else{
          addBtn.classList.remove("disabled");
        }
      }
      refreshAddState();

      addBtn.addEventListener("click", () => {
        const count = pairsWrap.querySelectorAll(".cqPair").length;
        if(count >= MAX_CUSTOM_PER_LETTER){
          savedMsg.textContent = `الحد الأقصى ${MAX_CUSTOM_PER_LETTER} أسئلة لهذا الحرف`;
          setTimeout(()=> { savedMsg.textContent = ""; }, 1400);
          return;
        }
        pairsWrap.appendChild(createPairEl("", ""));
        refreshAddState();
      });

      saveBtn.addEventListener("click", async () => {
        const out = [];
        pairsWrap.querySelectorAll(".cqPair").forEach(p => {
          const q = (p.querySelector(".cqQ")?.value || "").trim();
          const a = (p.querySelector(".cqA")?.value || "").trim();
          if(q || a) out.push({ q, a });
        });

        // ✅ (9) حد 7 — لا نحفظ أكثر
        if(out.length > MAX_CUSTOM_PER_LETTER){
          savedMsg.textContent = `الحد الأقصى ${MAX_CUSTOM_PER_LETTER} أسئلة فقط`;
          setTimeout(()=> { savedMsg.textContent = ""; }, 1400);
          return;
        }

        const latestRoom = getRoomWithPersistentCustomQuestions(CUSTOM_Q_UI.roomLatest || LIVE.room || {});
        const mergedQuestions = normalizeCustomQuestionsMap(latestRoom?.customQuestions || {});
        if(out.length) mergedQuestions[letter] = out;
        else delete mergedQuestions[letter];

        const saveTs = Date.now();
        savePersistedCustomQuestions(mergedQuestions, saveTs);
        CUSTOM_Q_PERSIST.remote = { updatedAt: saveTs, customQuestions: mergedQuestions };
        CUSTOM_Q_PERSIST.remoteLoaded = true;
        CUSTOM_Q_UI.roomLatest = {
          ...latestRoom,
          customQuestions: mergedQuestions,
          customQuestionsUpdatedAt: saveTs
        };

        LIVE.room = normalizeLiveRoom({
          ...(LIVE.room || {}),
          customQuestions: mergedQuestions,
          customQuestionsUpdatedAt: saveTs
        });
        scheduleRender();

        let roomSaved = false;
        let remoteSaved = false;

        try{
          await pushCustomQuestionsToRoom(mergedQuestions, saveTs);
          roomSaved = true;
        }catch(e){}

        try{
          await saveRemoteCustomQuestionsEnvelope(mergedQuestions, saveTs);
          remoteSaved = true;
        }catch(e){}

        if(remoteSaved){
          savedMsg.textContent = "تم الحفظ دائمًا ✅";
        }else if(roomSaved){
          savedMsg.textContent = "تم الحفظ داخل الجلسة ✅";
        }else{
          savedMsg.textContent = "تم الحفظ على هذا الجهاز ✅";
        }
        setTimeout(()=> { savedMsg.textContent = ""; }, 1400);

        refreshAddState();
      });
    }

    function getQuestionMode(room){
      const m = String(room?.questionMode || "default");

    function getQuestionCursorField(mode){
      return (mode === "custom") ? "questionCursorCustom" : "questionCursorDefault";
    }

    function getQuestionListByMode(room, letter, mode){
      if(!letter) return [];
      const useMode = (mode === "custom" || mode === "default") ? mode : getQuestionMode(room);
      return (useMode === "custom") ? getCustomList(room, letter) : (QUESTIONS[letter] || []);
    }

    function getNextQuestionSelection(room, letter, mode){
      const useMode = (mode === "custom" || mode === "default") ? mode : getQuestionMode(room);
      const list = getQuestionListByMode(room, letter, useMode);
      const cursorField = getQuestionCursorField(useMode);
      const cursorMap = (room && room[cursorField] && typeof room[cursorField] === "object") ? room[cursorField] : {};

      if(!list.length){
        return { mode: useMode, list, cursorField, qIndex: 0, nextCursor: 0 };
      }

      const hasSavedCursor = Object.prototype.hasOwnProperty.call(cursorMap || {}, letter);
      let qIndex = hasSavedCursor ? Number(cursorMap?.[letter]) : Math.floor(Math.random() * list.length);
      if(!Number.isFinite(qIndex) || qIndex < 0) qIndex = 0;
      qIndex = qIndex % list.length;

      return {
        mode: useMode,
        list,
        cursorField,
        qIndex,
        nextCursor: (qIndex + 1) % list.length
      };
    }

        const codeValue = String(staffModeInput?.value || "").trim();

          setStaffModeMsg("الرمز غير صحيح", "error");
          try{ staffModeInput?.focus(); staffModeInput?.select(); }catch(e){}
          return;

          await update(ref(db, `rooms/${code}`), {

          return `${x},${y} ${x+w},${y} ${x+w},${y+h} ${x},${y+h}`;
        }
        if(shape === "pentagon"){
          const pts = [
            [x + w/2, y],
            [x + w, y + h*0.36],
            [x + w*0.82, y + h],
            [x + w*0.18, y + h],
            [x, y + h*0.36]
          ];
          return pts.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(" ");

      function placeHexes(){

        const marginX = W * 0.08;
        const marginY = H * 0.05;
        const usableW = W - marginX*2;
        const usableH = H - marginY*2;

        let cellW, cellH, stepX, stepY;
        if(shape === "square"){
          cellW = usableW / size;
          cellH = usableH / size;
          stepX = cellW;
          stepY = cellH;
        }else if(shape === "pentagon"){
          cellW = usableW / (size + 0.35);
          cellH = usableH / (size + 0.15);
          stepX = cellW * 0.95;
          stepY = cellH * 0.96;
        }else{
          cellW = usableW / (size + 0.5);
          cellH = usableH / (size * 0.84 + 0.25);
          stepX = cellW;
          stepY = cellH * 0.76;
        }

        const cellsMeta = [];
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for(let row=0; row<size; row++){
          for(let col=0; col<size; col++){
            let x = marginX + (col * stepX);
            let y = marginY + (row * stepY);
            if(shape !== "square") x += (row % 2) * (cellW / 2);
            cellsMeta.push({ row, col, x, y });
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x + cellW);
            maxY = Math.max(maxY, y + cellH);
          }
        }

        const offsetX = ((W - (maxX - minX)) / 2) - minX;
        const offsetY = ((H - (maxY - minY)) / 2) - minY;

        let i = 0;
        for(const meta of cellsMeta){
          const x = meta.x + offsetX;
          const y = meta.y + offsetY;

          i++;

            const expectedBoardSeed = Number(LIVE.room?.round?.boardSeed || 0);
            if(expectedBoardSeed && Number(boardNow?.seed || 0) !== expectedBoardSeed) return;
            const sizeNow = Math.max(1, Number(boardNow.size || 5));
            const r = Number(cell.getAttribute("data-row"));
            const c = Number(cell.getAttribute("data-col"));
            if(r < 0 || c < 0 || r >= sizeNow || c >= sizeNow) return;
            const k = cellKey(r,c);

            const mapStatesNow = (LIVE.room.mapStates && LIVE.room.mapStates[String(activeMapNow)]) ? LIVE.room.mapStates[String(activeMapNow)] : {};
            const st = Number(mapStatesNow?.[k] ?? 0);
            const cur = LIVE.room.current || {};
            const curMap = Number(cur.map ?? activeMapNow);
            const isCurrentCell = (Number(cur.row) === r && Number(cur.col) === c && curMap === activeMapNow);

            const updates = {};
            updates[`rooms/${code}/buzzer`] = null;

            if(st === 0){
              const nextStates = { ...(mapStatesNow || {}) };

              if(Number(cur.row) >= 0 && Number(cur.col) >= 0 && curMap === activeMapNow){
                const prevKey = cellKey(Number(cur.row), Number(cur.col));
                if(prevKey !== k && Number(nextStates?.[prevKey] ?? 0) === 1){
                  delete nextStates[prevKey];
                  updates[`rooms/${code}/mapStates/${activeMapNow}/${prevKey}`] = null;
                }
              }

              const pick = getNextQuestionSelection(LIVE.room, letter);

              updates[`rooms/${code}/mapStates/${activeMapNow}/${k}`] = 1;
              updates[`rooms/${code}/current`] = { letter, qIndex: pick.qIndex, row: r, col: c, map: activeMapNow };
              if(pick.list.length){
                updates[`rooms/${code}/${pick.cursorField}/${letter}`] = pick.nextCursor;
              }

              try{
                const optimisticMapStates = { ...((LIVE.room && LIVE.room.mapStates) || {}) };
                const optimisticCurrentMap = { ...(mapStatesNow || {}) };
                optimisticCurrentMap[k] = 1;
                if(Number(cur.row) >= 0 && Number(cur.col) >= 0 && curMap === activeMapNow){
                  const prevKey = cellKey(Number(cur.row), Number(cur.col));
                  if(prevKey !== k && Number(mapStatesNow?.[prevKey] ?? 0) === 1){
                    delete optimisticCurrentMap[prevKey];
                  }
                }
                optimisticMapStates[String(activeMapNow)] = optimisticCurrentMap;
                const optimisticRoom = {
                  ...(LIVE.room || {}),
                  buzzer: null,
                  current: { letter, qIndex: pick.qIndex, row: r, col: c, map: activeMapNow },
                  mapStates: optimisticMapStates,
                  board: boardNow
                };
                LIVE.room = normalizeLiveRoom(optimisticRoom);
                scheduleRender();
              }catch(e){}

              await update(ref(db), updates);
              return;
            }

            const nextStates = { ...(mapStatesNow || {}) };
            delete nextStates[k];

            const winners = computeWinners(nextStates, boardNow);
            updates[`rooms/${code}/mapStates/${activeMapNow}/${k}`] = null;
            updates[`rooms/${code}/winState/${activeMapNow}`] = { greenWin: !!winners.greenWin, orangeWin: !!winners.orangeWin };

            if(isCurrentCell){
              updates[`rooms/${code}/current`] = { letter:null, qIndex:0, row:null, col:null, map:activeMapNow };
            }

            await update(ref(db), updates);
          });
        });

        });

          const finalLetterSize = Math.max(30, Math.min(baseLetterSize, isTvMode ? 72 : 64));
          txt.setAttribute("font-size", finalLetterSize.toFixed(2));
          txt.style.fontSize = finalLetterSize.toFixed(2) + "px";
          txt.style.strokeWidth = Math.max(1.8, finalLetterSize * 0.07).toFixed(2) + "px";

          txt.textContent = getDisplayedCellValue(board, meta.row, meta.col);
          i++;
        }
        applyZoomFix();
      }
      GAME_UI.placeHexes = placeHexes;
      GAME_UI.onMapReady = () => requestAnimationFrame(placeHexes);
      GAME_UI.onMapReady();
      zoom.addEventListener("input", applyZoomFix);

    function afterRender(room){
      try{
        TIMER_UI.latestTimer = room.timer || {};
