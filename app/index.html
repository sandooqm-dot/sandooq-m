<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لعبة سباق الحروف</title>
  <style>
    @font-face{
      font-family:"AA-GALAXY";
      src:url("../AA-GALAXY.otf") format("opentype");
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bgSolid:#7b1f63;
      --yellow:#f4c400;
      --card:#f7eef5;
      --text:#111;
      --muted:#6b6b6b;
      --line:#e6d1e0;
      --soft:#f2e8ef;
      --active:#7b1f63;
      --activeText:#fff4b0;
      --shadow:0 12px 34px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      color:#fff;
      text-align:center;
      font-family:"AA-GALAXY", Arial, sans-serif;
      background:var(--bgSolid);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    button, input{
      font-family:"AA-GALAXY", Arial, sans-serif;
    }

    header{
      position:relative;
      padding:26px 16px 0;
    }

    .logo{
      position:absolute;
      left:14px;
      top:14px;
      width:86px;
      height:86px;
      object-fit:contain;
      pointer-events:none;
    }

    h1{
      margin:18px 0 16px;
      color:var(--yellow);
      font-size:28px;
      line-height:1.35;
    }

    .wrap{
      width:92%;
      max-width:560px;
      margin:0 auto;
      padding-bottom:28px;
    }

    .card{
      background:var(--card);
      color:var(--text);
      border-radius:18px;
      padding:16px 14px 18px;
      box-shadow:var(--shadow);
      text-align:right;
    }

    .section{
      margin-bottom:18px;
    }

    .label{
      display:block;
      font-size:18px;
      color:#401436;
      margin:0 0 10px;
      text-align:center;
    }

    input{
      width:100%;
      padding:14px 14px;
      font-size:16px;
      border-radius:12px;
      border:2px solid var(--line);
      background:#fff;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    input:focus{
      border-color:#a94789;
      box-shadow:0 0 0 3px rgba(169,71,137,.12);
    }

    .row-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .option-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }

    .opt-btn{
      width:100%;
      min-height:48px;
      padding:12px 8px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:var(--soft);
      color:#4e2944;
      font-size:16px;
      border:2px solid transparent;
      transition:transform .12s ease, border-color .12s ease, background .12s ease, color .12s ease;
    }

    .opt-btn:active{
      transform:scale(.98);
    }

    .opt-btn.active{
      background:var(--active);
      color:var(--activeText);
      border-color:#f4c400;
      box-shadow:0 8px 18px rgba(123,31,99,.22);
    }

    .players-box{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      padding:8px 12px;
      background:#fff;
      border:2px solid var(--line);
      border-radius:14px;
      direction:ltr;
      min-height:56px;
    }

    .players-btn{
      width:34px;
      height:34px;
      border:none;
      border-radius:10px;
      background:var(--active);
      color:var(--activeText);
      font-size:18px;
      line-height:1;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(123,31,99,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 34px;
      padding:0;
      font-family:Arial, sans-serif;
      font-weight:700;
    }

    .players-btn:active{
      transform:scale(.97);
    }

    .players-value{
      min-width:34px;
      text-align:center;
      color:#401436;
      font-size:18px;
      line-height:1;
    }

    .colors-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px;
    }

    .color-pair{
      position:relative;
      width:100%;
      min-height:76px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      overflow:hidden;
      padding:0;
      background:#f2f2f2;
      border:3px solid transparent;
      transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      box-shadow:0 6px 14px rgba(0,0,0,.08);
    }

    .color-pair:active{
      transform:scale(.98);
    }

    .color-pair.active{
      border-color:#23d7e8;
      box-shadow:0 0 0 2px rgba(35,215,232,.18), 0 10px 22px rgba(0,0,0,.15);
    }

    .pair-icon-wrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 6px;
      background:#f5f5f5;
    }

    .pair-icon{
      position:relative;
      width:74px;
      height:50px;
    }

    .pair-cell{
      position:absolute;
      width:34px;
      height:34px;
      top:8px;
      clip-path:polygon(25% 6%, 75% 6%, 94% 50%, 75% 94%, 25% 94%, 6% 50%);
      border:2px solid rgba(61,33,95,.68);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.2);
    }

    .pair-cell.left{
      left:10px;
    }

    .pair-cell.right{
      right:10px;
    }

    .pair-name{
      display:none;
    }

    .submit-btn{
      width:100%;
      padding:16px;
      margin-top:8px;
      font-size:20px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      background:var(--yellow);
      color:#000;
      box-shadow:0 10px 20px rgba(0,0,0,.12);
    }

    .submit-btn[disabled]{
      opacity:.75;
      cursor:not-allowed;
    }

    @media (max-width: 420px){
      .option-grid{
        grid-template-columns:repeat(3, 1fr);
        gap:8px;
      }
      .opt-btn{
        font-size:15px;
        min-height:46px;
      }
      .label{
        font-size:17px;
      }
      .row-2{
        gap:8px;
      }
      .colors-grid{
        grid-template-columns:repeat(2, 1fr);
      }
      .players-box{
        gap:16px;
        min-height:54px;
      }
      .players-btn{
        width:32px;
        height:32px;
        flex-basis:32px;
        font-size:16px;
      }
      .players-value{
        min-width:30px;
        font-size:17px;
      }
    }
  </style>
</head>
<body>

  <header>
    <img class="logo" src="../logo.png" alt="شعار صندوق المسابقات">
    <h1>لعبة سباق الحروف</h1>
  </header>

  <div class="wrap">
    <div class="card">

      <div class="section">
        <label class="label" for="name">اسم المسابقة</label>
        <input id="name" placeholder="اكتب اسم المسابقة">
      </div>

      <div class="section">
        <div class="label">أسماء الفريقين</div>
        <div class="row-2">
          <input id="team1" placeholder="اسم الفريق الأول">
          <input id="team2" placeholder="اسم الفريق الثاني">
        </div>
      </div>

      <div class="section">
        <div class="label">عدد اللاعبين</div>
        <div class="players-box">
          <button type="button" class="players-btn" id="playersPlus" aria-label="زيادة عدد اللاعبين">&lt;</button>
          <div class="players-value" id="playersValue">1</div>
          <button type="button" class="players-btn" id="playersMinus" aria-label="تقليل عدد اللاعبين">&gt;</button>
        </div>
      </div>

      <div class="section">
        <div class="label">عدد جولات الفوز</div>
        <div class="option-grid" id="roundsOptions">
          <button type="button" class="opt-btn active" data-group="rounds" data-value="1">جولة</button>
          <button type="button" class="opt-btn" data-group="rounds" data-value="3">ثلاث جولات</button>
          <button type="button" class="opt-btn" data-group="rounds" data-value="5">خمس جولات</button>
        </div>
      </div>

      <div class="section">
        <div class="label">نوع الخلايا</div>
        <div class="option-grid" id="cellCountOptions">
          <button type="button" class="opt-btn active" data-group="cellCount" data-value="4">رباعية</button>
          <button type="button" class="opt-btn" data-group="cellCount" data-value="5">خماسية</button>
          <button type="button" class="opt-btn" data-group="cellCount" data-value="6">سداسية</button>
        </div>
      </div>

      <div class="section">
        <div class="label">لون الخلايا</div>
        <div class="colors-grid" id="colorPairs"></div>
      </div>

      <button id="btn" class="submit-btn">إنشاء اللعبة</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const SYNC_BASE = (params.get("sync") || "https://sync.horof.sandooq-games.com").replace(/\/$/,"");

    const COLOR_PAIRS = [
      { id:"cream-rose",     name:"كريمي + وردي",      a:"#edd39a", b:"#f58b96" },
      { id:"purple-mint",    name:"بنفسجي + نعناعي",   a:"#7a1fc3", b:"#49f0b8" },
      { id:"blue-pink",      name:"أزرق + وردي",       a:"#0f58ad", b:"#ff3ca6" },
      { id:"green-orange",   name:"أخضر + برتقالي",    a:"#31b80f", b:"#ff8a3d" },
      { id:"navy-rose",      name:"كحلي + وردي",       a:"#132f67", b:"#de5f95" },
      { id:"salmon-teal",    name:"برتقالي + تركواز",  a:"#ff815d", b:"#12a9b0" },
      { id:"yellow-sky",     name:"أصفر + سماوي",      a:"#ffe87a", b:"#9ad3ff" },
      { id:"sand-sage",      name:"رملي + زيتي",       a:"#efc06b", b:"#8fb691" }
    ];

    const state = {
      rounds: 1,
      cellCount: 4,
      colorPairId: COLOR_PAIRS[0].id,
      players: 1
    };

    function random6(){
      return String(Math.floor(100000 + Math.random()*900000));
    }

    function randomKey(){
      try{
        if (crypto?.randomUUID) return crypto.randomUUID();
      }catch(e){}
      return (
        Math.random().toString(36).slice(2) +
        Math.random().toString(36).slice(2) +
        Date.now().toString(36)
      );
    }

    async function fetchJSON(url, opts){
      const r = await fetch(url, opts);
      const j = await r.json().catch(()=>null);
      return { ok:r.ok, status:r.status, json:j };
    }

    async function roomExists(code){
      const url = `${SYNC_BASE}/state?room=${encodeURIComponent(code)}`;
      const { json } = await fetchJSON(url, { cache:"no-store" });
      const st = (json && json.ok && json.state && typeof json.state === "object") ? json.state : {};
      return !!(st.createdAt || st.status || st.hostKey || st.presenterKey);
    }

    function getColorPair(id){
      return COLOR_PAIRS.find(p => p.id === id) || COLOR_PAIRS[0];
    }

    function renderColorPairs(){
      const root = document.getElementById("colorPairs");
      root.innerHTML = "";

      COLOR_PAIRS.forEach(pair => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "color-pair" + (state.colorPairId === pair.id ? " active" : "");
        btn.setAttribute("data-pair-id", pair.id);
        btn.innerHTML = `
          <div class="pair-icon-wrap">
            <div class="pair-icon" aria-hidden="true">
              <span class="pair-cell left" style="background:${pair.a}"></span>
              <span class="pair-cell right" style="background:${pair.b}"></span>
            </div>
          </div>
          <span class="pair-name">${pair.name}</span>
        `;
        btn.addEventListener("click", () => {
          state.colorPairId = pair.id;
          renderColorPairs();
        });
        root.appendChild(btn);
      });
    }

    function setupOptionButtons(){
      document.querySelectorAll(".opt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const group = btn.dataset.group;
          const value = btn.dataset.value;

          document.querySelectorAll(`.opt-btn[data-group="${group}"]`).forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          if (group === "rounds") state.rounds = Number(value);
          if (group === "cellCount") state.cellCount = Number(value);
        });
      });
    }

    function updatePlayersView(){
      const el = document.getElementById("playersValue");
      if(el) el.textContent = String(state.players);
    }

    function setupPlayersControl(){
      const plus = document.getElementById("playersPlus");
      const minus = document.getElementById("playersMinus");

      plus.addEventListener("click", () => {
        state.players = Math.min(13, state.players + 1);
        updatePlayersView();
      });

      minus.addEventListener("click", () => {
        state.players = Math.max(1, state.players - 1);
        updatePlayersView();
      });

      updatePlayersView();
    }

    async function createRoom(){
      const name = document.getElementById("name").value.trim();
      const team1 = document.getElementById("team1").value.trim() || "الفريق الأول";
      const team2 = document.getElementById("team2").value.trim() || "الفريق الثاني";
      const players = state.players;
      const pair = getColorPair(state.colorPairId);

      if(!name){
        alert("اكتب اسم المسابقة");
        return;
      }

      const btn = document.getElementById("btn");
      btn.disabled = true;

      let code = "";
      for(let i=0;i<12;i++){
        const c = random6();
        try{
          const exists = await roomExists(c);
          if(!exists){
            code = c;
            break;
          }
        }catch(e){}
      }

      if(!code){
        btn.disabled = false;
        alert("حاول مرة ثانية");
        return;
      }

      const hostKey = randomKey();

      const room = {
        code,
        name,
        competitionName: name,
        maxPlayers: players,
        hostKey,
        presenterKey: hostKey,
        status: "lobby",
        createdAt: Date.now(),

        settings: {
          competitionName: name,
          team1Name: team1,
          team2Name: team2,
          winRounds: state.rounds,
          cellCount: state.cellCount,
          gridType: state.cellCount === 4 ? "square" : state.cellCount === 5 ? "pentagon" : "hex",
          colorPairId: state.colorPairId,
          colorPair: {
            a: pair.a,
            b: pair.b
          }
        },

        teams: {
          a: {
            key: "a",
            name: team1,
            color: pair.a,
            score: 0
          },
          b: {
            key: "b",
            name: team2,
            color: pair.b,
            score: 0
          }
        },

        scores: {
          a: 0,
          b: 0,
          green: 0,
          orange: 0
        },

        round: {
          current: 1,
          targetWins: state.rounds,
          winner: null
        },

        grid: {
          type: state.cellCount === 4 ? "square" : state.cellCount === 5 ? "pentagon" : "hex",
          size: state.cellCount,
          colorPairId: state.colorPairId,
          colorA: pair.a,
          colorB: pair.b,
          selectedCellId: null,
          selectedTeamKey: null,
          cells: [],
          version: 1
        },

        displayPid: null,
        activeMap: 0,
        freeze: false,
        buzzer: null,

        current: {
          letter: null,
          qIndex: 0,
          row: null,
          col: null,
          map: 0
        },

        timer: {
          sel: 10,
          dur: 10,
          running: false,
          startTs: 0,
          done: false
        },

        questionMode: "default",
        customQuestions: {},
        customQuestionsUpdatedAt: 0,

        winEvent: null,
        winState: {},
        mapStates: {},
        players: {},
        tvLock: null
      };

      try{
        const url = `${SYNC_BASE}/action?room=${encodeURIComponent(code)}`;
        const { json } = await fetchJSON(url, {
          method:"POST",
          headers:{ "content-type":"application/json" },
          body: JSON.stringify(room)
        });

        if(!json || !json.ok){
          btn.disabled = false;
          alert("صار خطأ أثناء إنشاء الغرفة، حاول مرة ثانية");
          return;
        }

        const u = new URL("../game.html", location.href);
        u.searchParams.set("role", "host");
        u.searchParams.set("code", code);
        u.searchParams.set("key", hostKey);
        location.href = u.toString();

      }catch(e){
        btn.disabled = false;
        alert("صار خطأ، حاول مرة ثانية");
      }
    }

    renderColorPairs();
    setupOptionButtons();
    setupPlayersControl();
    document.getElementById("btn").addEventListener("click", createRoom);
  </script>
</body>
</html>
