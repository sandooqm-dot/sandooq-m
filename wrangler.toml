name = "horof-sync"
main = "src/index.js"
compatibility_date = "2026-02-19"

[vars]
ALLOWED_ORIGINS = "https://horof.sandooq-games.com,https://sync.horof.sandooq-games.com"

# حد رسائل Pusher الشهري
PUSHER_MESSAGES_LIMIT = "4000000"
PUSHER_PLAN_MESSAGES = "4000000"
PUSHER_PLAN_CONNECTIONS = "2000"

# بداية دورة فوترة Pusher (اختياري - للوحة المراقبة)
PUSHER_BILLING_START = "2026-03-19T22:14:00+03:00"

# خطة Cloudflare الحالية
CF_PLAN_NAME = "Workers Paid ($5)"
CF_PLAN_REQUESTS_MONTH = "10000000"
CF_FREE_DAILY_REQUESTS = "100000"

# انتهاء الغرفة بعد ساعتين خمول
ROOM_IDLE_MS = "7200000"

# Sampling للمراقبة لتقليل الضغط على Durable Objects
# 1 = تسجيل كل الطلبات
# 0.10 = تسجيل 10% من الطلبات السليمة
MONITOR_SAMPLE_STATE_OK = "0.05"
MONITOR_SAMPLE_ACTION_OK = "0.35"
MONITOR_SAMPLE_STATS_OK = "0.15"
MONITOR_SAMPLE_HEALTH_OK = "0.10"
MONITOR_SAMPLE_PUSHER_AUTH_OK = "0.25"
MONITOR_SAMPLE_PUSHER_CONFIG_OK = "0.15"
MONITOR_SAMPLE_PUSHER_TRIGGER_OK = "1"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]
